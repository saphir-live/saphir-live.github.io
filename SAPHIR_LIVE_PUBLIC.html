<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAPHIR LIVE ! | Public</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00e5ff; --bg: #000000; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: white; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            transition: background-color 0.15s ease-out;
        }

        /* --- OVERLAY DE VOTE --- */
        #vote-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
            opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(1.1);
        }

        #vote-overlay.active {
            opacity: 1; pointer-events: auto;
            transform: scale(1);
        }

        .vote-card {
            width: 85%; max-width: 400px;
            text-align: center;
        }

        #session-badge {
            display: inline-block;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.6rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h1 { 
            font-family: 'Cinzel', serif; 
            font-size: 1.6rem; 
            margin-bottom: 25px; 
            color: white;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        #vote-question {
            font-size: 1rem; margin-bottom: 30px; font-weight: 300; line-height: 1.4;
        }

        /* Grille des boutons de vote */
        #vote-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:active {
            background: var(--neon);
            color: black;
            transform: scale(0.95);
        }

        /* --- BOUTON PLEIN ÉCRAN --- */
        #fs-btn {
            position: fixed; top: 20px; right: 20px; z-index: 200;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px; border-radius: 50%;
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
        }
        
        body.is-fs #fs-btn { opacity: 0; pointer-events: none; }

        #waiting-msg { font-size: 0.7rem; letter-spacing: 3px; opacity: 0.3; text-transform: uppercase; }
    </style>
</head>
<body onclick="handleFirstClick()">

    <button id="fs-btn" onclick="toggleFS()">
        <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>

    <div id="waiting-msg">En attente du signal SAPHIR...</div>

    <div id="vote-overlay">
        <div class="vote-card">
            <div id="session-badge">Live Session</div>
            <h1 id="vote-title">VOTRE CHOIX</h1>
            <p id="vote-question">Chargement du vote...</p>
            
            <div id="vote-options">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXOd8Sb_TsiYqwbebCnXTdZGimeheesR4",
            authDomain: "saphir-live.firebaseapp.com",
            projectId: "saphir-live",
            databaseURL: "https://saphir-live-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const auth = getAuth();
signInAnonymously(auth).then(() => {
    console.log("Spectateur connecté anonymement.");
});

        let currentSessionId = 0;
        let hasVoted = false;

        // --- ÉCOUTE DES NOTES (COULEUR DE FOND) ---
        let fadeTimeout;
        onValue(ref(db, 'piano'), snap => {
            const d = snap.val();
            if (d && d.lastEvent === 'noteOn') {
                document.body.style.backgroundColor = d.lastColor || '#00d4ff';
                document.getElementById('waiting-msg').style.opacity = '0';
                clearTimeout(fadeTimeout);
                fadeTimeout = setTimeout(() => { document.body.style.backgroundColor = '#000000'; }, 1000);
            }
        });

        // --- ÉCOUTE DES VOTES (SYNCHRO MASTER) ---
        onValue(ref(db, 'lights/currentVote'), snap => {
            const vote = snap.val();
            const overlay = document.getElementById('vote-overlay');
            
            if (vote && vote.active) {
                // Si c'est une nouvelle session de vote, on réinitialise l'état "a voté"
                if (vote.sessionId !== currentSessionId) {
                    currentSessionId = vote.sessionId;
                    hasVoted = false;
                }

                if (!hasVoted) {
                    document.getElementById('vote-question').innerText = vote.question;
                    const container = document.getElementById('vote-options');
                    container.innerHTML = ''; // Nettoyer les anciens boutons

                    // Génération dynamique des choix (jusqu'à 4)
                    vote.options.forEach((optText, index) => {
                        const btn = document.createElement('button');
                        btn.className = 'option-btn';
                        btn.innerText = optText;
                        btn.onclick = () => submitVote(index + 1);
                        container.appendChild(btn);
                    });

                    overlay.classList.add('active');
                }
            } else {
                overlay.classList.remove('active');
            }
        });

        // --- ENVOI DU VOTE ---
        window.submitVote = function(optionIndex) {
            hasVoted = true;
            document.getElementById('vote-overlay').classList.remove('active');

            // On incrémente le compteur spécifique sur Firebase
            const voteRef = ref(db, `votes/session_${currentSessionId}/m${optionIndex}`);
            set(voteRef, increment(1));
            
            // Petit feedback visuel
            document.body.style.backgroundColor = 'rgba(0, 229, 255, 0.5)';
            setTimeout(() => { document.body.style.backgroundColor = '#000000'; }, 200);
        };

        // --- PLEIN ÉCRAN & INTERACTION ---
        window.toggleFS = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        };

        document.addEventListener('fullscreenchange', () => {
            document.body.classList.toggle('is-fs', !!document.fullscreenElement);
        });

        window.handleFirstClick = function() {
            // Optionnel : déclencher un son vide pour débloquer l'audio sur iOS
        };
    </script>
</body>
</html>
