<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saphir | Elegant Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --saphir-deep: #0f172a;
            --saphir-blue: #0ea5e9;
            --saphir-light: #38bdf8;
            --saphir-gold: #fbbf24;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container with subtle glow */
        .calendar-container {
            max-width: 1200px;
            margin: 40px auto;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* Header section with Artistic Typography */
        header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: linear-gradient(to bottom, rgba(255,255,255,0.02), transparent);
        }

        .brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--saphir-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        #currentWeekRange {
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--text-dim);
            margin-top: 5px;
        }

        /* Button Styling */
        .nav-btns { display: flex; gap: 12px; align-items: center; }

        button {
            font-family: 'Inter', sans-serif;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
        }

        button:hover {
            background: var(--saphir-blue);
            border-color: var(--saphir-light);
            transform: translateY(-2px);
        }

        .add-btn {
            background: white;
            color: var(--saphir-deep);
            font-weight: 600;
            border: none;
        }

        .add-btn:hover {
            background: var(--saphir-gold);
            color: var(--saphir-deep);
        }

        /* Grid Design */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0;
            background: var(--glass-border);
        }

        .day-column {
            background: rgba(15, 23, 42, 0.4);
            min-height: 500px;
            transition: background 0.3s;
            border-right: 1px solid var(--glass-border);
        }

        .day-column:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .day-header {
            padding: 25px 15px;
            text-align: center;
        }

        .day-header span {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--saphir-light);
            margin-bottom: 8px;
        }

        .day-header strong {
            font-size: 1.5rem;
            font-family: 'Playfair Display', serif;
        }

        /* Event Cards */
        .event {
            margin: 8px;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.4;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .event.concert {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.2), rgba(14, 165, 233, 0.05));
            border-left: 3px solid var(--saphir-blue);
        }

        .event.singing {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(251, 191, 36, 0.05));
            border-left: 3px solid var(--saphir-gold);
        }

        .event-time {
            display: block;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        /* Modal Redesign */
        .modal-content {
            background: #1e293b;
            border: 1px solid var(--saphir-light);
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.2);
            color: white;
            border-radius: 20px;
            padding: 40px;
        }

        input, select {
            background: rgba(0,0,0,0.2) !important;
            border: 1px solid var(--glass-border) !important;
            color: white !important;
            padding: 12px !important;
            margin: 15px 0 !important;
        }

        @media (max-width: 900px) {
            .calendar-grid { grid-template-columns: 1fr; }
            .day-column { min-height: auto; border-bottom: 1px solid var(--glass-border); }
            header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="calendar-container">
    <header>
        <div class="brand">
            <h1>Saphir</h1>
            <div id="currentWeekRange">Selected Week</div>
        </div>
        <div class="nav-btns">
            <button id="prevWeek">Prev</button>
            <button id="today">Today</button>
            <button id="nextWeek">Next</button>
            <button class="add-btn" id="openModal">Schedule Event</button>
        </div>
    </header>

    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div id="eventModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family: 'Playfair Display', serif;">New Event</h2>
        <form id="eventForm">
            <input type="text" id="title" placeholder="Event Name" required>
            <div style="display:flex; gap:10px;">
                <input type="date" id="date" required style="flex:2">
                <input type="time" id="time" required style="flex:1">
            </div>
            <select id="type">
                <option value="concert">Concert Performance</option>
                <option value="singing">Choral / Singing Session</option>
            </select>
            <input type="password" id="password" placeholder="Access Key" required>
            <button type="submit" class="add-btn" style="width:100%; margin-top:20px;">Confirm Registration</button>
            <button type="button" id="closeModal" style="width:100%; margin-top:10px; background:transparent;">Dismiss</button>
        </form>
    </div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    // --- REPLACE WITH YOUR CONFIG ---
        const firebaseConfig = {
    apiKey: "AIzaSyDKlg9GOJxXliHqdIWUvGy-XLUh93ceTas",
    authDomain: "planification-b909d.firebaseapp.com",
    projectId: "planification-b909d",
    storageBucket: "planification-b909d.firebasestorage.app",
    messagingSenderId: "548367340058",
    appId: "1:548367340058:web:e4531587c33987a3c8b7a3",
    measurementId: "G-6L5XTTSFL4"
  };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentMonday = getMonday(new Date());

    function getMonday(d) {
        d = new Date(d);
        let day = d.getDay();
        let diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(d.setDate(diff));
    }

    function updateUI() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const endOfWeek = new Date(currentMonday);
        endOfWeek.setDate(endOfWeek.getDate() + 6);
        
        document.getElementById('currentWeekRange').innerText = `${currentMonday.toLocaleDateString('en-US', {month:'short', day:'numeric'})} - ${endOfWeek.toLocaleDateString('en-US', {month:'short', day:'numeric'})}`;
        document.getElementById('currentYear').innerText = currentMonday.getFullYear();

        for (let i = 0; i < 7; i++) {
            let dayDate = new Date(currentMonday);
            dayDate.setDate(dayDate.getDate() + i);
            let dateStr = dayDate.toISOString().split('T')[0];

            const dayCol = document.createElement('div');
            dayCol.className = 'day-column';
            dayCol.innerHTML = `
                <div class="day-header">
                    <span>${dayDate.toLocaleDateString('en-US', { weekday: 'short' })}</span>
                    <strong>${dayDate.getDate()}</strong>
                </div>
                <div class="events-list" id="events-${dateStr}"></div>
            `;
            grid.appendChild(dayCol);

            const q = query(collection(db, "evenements"), where("date", "==", dateStr));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById(`events-${dateStr}`);
                if (!container) return;
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="event ${data.type}">
                            <span class="event-time">${data.heure}</span>
                            <strong>${data.titre}</strong>
                        </div>`;
                });
            });
        }
    }

    // Navigation logic
    document.getElementById('prevWeek').onclick = () => { currentMonday.setDate(currentMonday.getDate() - 7); updateUI(); };
    document.getElementById('nextWeek').onclick = () => { currentMonday.setDate(currentMonday.getDate() + 7); updateUI(); };
    document.getElementById('today').onclick = () => { currentMonday = getMonday(new Date()); updateUI(); };

    // Modal Logic
    const modal = document.getElementById('eventModal');
    document.getElementById('openModal').onclick = () => modal.style.display = 'flex';
    document.getElementById('closeModal').onclick = () => modal.style.display = 'none';

    // Verification & Submission
    document.getElementById('eventForm').onsubmit = async (e) => {
        e.preventDefault();
        const inputPass = document.getElementById('password').value;

        try {
            // 1. Fetch password from Firebase
            // Assumption: You have a collection 'settings' and a document 'auth' with field 'adminKey'
            const configRef = doc(db, "settings", "auth");
            const configSnap = await getDoc(configRef);

            if (configSnap.exists()) {
                const correctPass = configSnap.data().adminKey;

                if (inputPass === correctPass) {
                    // 2. Add the event
                    const newEvent = {
                        titre: document.getElementById('title').value,
                        date: document.getElementById('date').value,
                        heure: document.getElementById('time').value,
                        type: document.getElementById('type').value
                    };
                    await addDoc(collection(db, "evenements"), newEvent);
                    modal.style.display = 'none';
                    e.target.reset();
                    alert("Event added successfully!");
                } else {
                    alert("Incorrect password. Access denied.");
                }
            } else {
                alert("Security error: Password not found in database.");
            }
        } catch (err) {
            console.error("Error:", err);
            alert("An error occurred while connecting to the database.");
        }
    };

    updateUI();
</script>
</body>
</html>
