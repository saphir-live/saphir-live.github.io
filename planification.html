    <!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saphir | Premium Secured Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --saphir-deep: #0f172a;
            --saphir-blue: #0ea5e9;
            --saphir-light: #38bdf8;
            --saphir-gold: #fbbf24;
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --hour-height: 80px; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            margin: 0; padding: 20px;
        }

        .calendar-container {
            max-width: 1300px;
            margin: 20px auto;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        header {
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin: 0; color: var(--saphir-light); }
        #currentWeekRange { color: #94a3b8; font-weight: 300; }

        .schedule-wrapper {
            display: flex;
            position: relative;
            background: rgba(0,0,0,0.2);
            overflow-x: auto;
            height: 70vh; /* Scrollable area */
        }

        .time-gutter {
            width: 70px;
            flex-shrink: 0;
            background: rgba(15, 23, 42, 0.9);
            border-right: 1px solid var(--glass-border);
            z-index: 20;
        }

        .time-slot {
            height: var(--hour-height);
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
            line-height: var(--hour-height);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            flex-grow: 1;
            min-width: 800px; /* Prevent squishing */
        }

        .day-column {
            position: relative;
            border-right: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.01);
        }

        .day-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: #1e293b;
            padding: 15px 5px;
            text-align: center;
            border-bottom: 2px solid var(--saphir-blue);
        }

        .day-header span { display: block; font-size: 0.7rem; color: var(--saphir-light); text-transform: uppercase; letter-spacing: 1px; }

        /* Events */
        .event {
            position: absolute;
            left: 6px; right: 6px;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            z-index: 2;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .event:hover { transform: translateY(-2px); filter: brightness(1.2); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .event.concert { background: linear-gradient(135deg, rgba(14,165,233,0.3), rgba(14,165,233,0.1)); border-left: 4px solid var(--saphir-blue); }
        .event.singing { background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(251,191,36,0.05)); border-left: 4px solid var(--saphir-gold); }

        /* Form / Modal */
        button { background: var(--glass-border); color: white; border: 1px solid var(--glass-border); padding: 10px 18px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--saphir-blue); border-color: var(--saphir-light); }
        .add-btn { background: var(--saphir-light); color: var(--saphir-deep); font-weight: bold; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; z-index:1000; }
        .modal-content { background:#1e293b; padding:40px; border-radius:24px; width:380px; border: 1px solid var(--saphir-light); }
        input, select { width:100%; margin: 12px 0; padding:12px; background:#0f172a; border:1px solid #334155; color:white; border-radius:8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="calendar-container">
    <header>
        <div class="brand"><h1>Saphir</h1><div id="currentWeekRange">...</div></div>
        <div class="nav-btns">
            <button id="prevWeek">Prev</button>
            <button id="today">Today</button>
            <button id="nextWeek">Next</button>
            <button class="add-btn" id="openModal">+ New Event</button>
        </div>
    </header>

    <div class="schedule-wrapper">
        <div class="time-gutter" id="timeGutter"></div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>
</div>

<div id="eventModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family: 'Playfair Display'; margin-top:0">Add Performance</h2>
        <form id="eventForm">
            <input type="text" id="title" placeholder="Event Title" required>
            <input type="date" id="date" required>
            <input type="time" id="time" required>
            <select id="type">
                <option value="concert">Concert</option>
                <option value="singing">Singing Session</option>
            </select>
            <input type="password" id="password" placeholder="Admin Access Key" required>
            <button type="submit" style="width:100%; background:var(--saphir-light); color:#000; font-weight:600;">Secure Save</button>
            <button type="button" id="closeModal" style="width:100%; margin-top:10px; background:transparent;">Cancel</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, getDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

            const firebaseConfig = {
    apiKey: "AIzaSyDKlg9GOJxXliHqdIWUvGy-XLUh93ceTas",
    authDomain: "planification-b909d.firebaseapp.com",
    projectId: "planification-b909d",
    storageBucket: "planification-b909d.firebasestorage.app",
    messagingSenderId: "548367340058",
    appId: "1:548367340058:web:e4531587c33987a3c8b7a3",
    measurementId: "G-6L5XTTSFL4"
  };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const HOUR_HEIGHT = 80;
    const HEADER_OFFSET = 70; // Height of the sticky day header

    // Init Time Gutter
    const gutter = document.getElementById('timeGutter');
    for(let i=0; i<24; i++) {
        gutter.innerHTML += `<div class="time-slot">${i}:00</div>`;
    }

    let currentMonday = getMonday(new Date());

    function getMonday(d) {
        d = new Date(d);
        let day = d.getDay();
        let diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(d.setDate(diff));
    }

    // Secure Delete Function
    async function deleteEvent(id, title) {
        const inputPass = prompt(`To delete "${title}", enter Admin Key:`);
        if (!inputPass) return;

        const configSnap = await getDoc(doc(db, "settings", "auth"));
        if (configSnap.exists() && inputPass === configSnap.data().adminKey) {
            if (confirm("Confirm permanent deletion?")) {
                await deleteDoc(doc(db, "evenements", id));
            }
        } else {
            alert("Unauthorized.");
        }
    }

    function updateUI() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        
        const endOfWeek = new Date(currentMonday);
        endOfWeek.setDate(endOfWeek.getDate() + 6);
        document.getElementById('currentWeekRange').innerText = `${currentMonday.toLocaleDateString('en-US', {month:'short', day:'numeric'})} - ${endOfWeek.toLocaleDateString('en-US', {month:'short', day:'numeric'})}`;

        for (let i = 0; i < 7; i++) {
            let dayDate = new Date(currentMonday);
            dayDate.setDate(dayDate.getDate() + i);
            let dateStr = dayDate.toISOString().split('T')[0];

            const dayCol = document.createElement('div');
            dayCol.className = 'day-column';
            dayCol.innerHTML = `
                <div class="day-header">
                    <span>${dayDate.toLocaleDateString('en-US', { weekday: 'short' })}</span>
                    <strong>${dayDate.getDate()}</strong>
                </div>
            `;
            grid.appendChild(dayCol);

            // Corrected Query Scope
            const q = query(collection(db, "evenements"), where("date", "==", dateStr));
            onSnapshot(q, (snapshot) => {
                // Clear old events in this column
                dayCol.querySelectorAll('.event').forEach(e => e.remove());

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const [h, m] = data.heure.split(':').map(Number);
                    const topPos = (h * HOUR_HEIGHT) + (m * (HOUR_HEIGHT/60)) + HEADER_OFFSET;

                    const evEl = document.createElement('div');
                    evEl.className = `event ${data.type}`;
                    evEl.style.top = `${topPos}px`;
                    evEl.innerHTML = `<b>${data.heure}</b><br>${data.titre}`;
                    
                    evEl.onclick = () => deleteEvent(docSnap.id, data.titre);
                    dayCol.appendChild(evEl);
                });
            });
        }
    }

    // Modal & Navigation
    document.getElementById('openModal').onclick = () => document.getElementById('eventModal').style.display = 'flex';
    document.getElementById('closeModal').onclick = () => document.getElementById('eventModal').style.display = 'none';
    
    document.getElementById('eventForm').onsubmit = async (e) => {
        e.preventDefault();
        const inputPass = document.getElementById('password').value;
        const configSnap = await getDoc(doc(db, "settings", "auth"));
        
        if (configSnap.exists() && inputPass === configSnap.data().adminKey) {
            await addDoc(collection(db, "evenements"), {
                titre: document.getElementById('title').value,
                date: document.getElementById('date').value,
                heure: document.getElementById('time').value,
                type: document.getElementById('type').value
            });
            document.getElementById('eventModal').style.display = 'none';
            e.target.reset();
        } else { alert("Incorrect Key"); }
    };

    document.getElementById('prevWeek').onclick = () => { currentMonday.setDate(currentMonday.getDate() - 7); updateUI(); };
    document.getElementById('nextWeek').onclick = () => { currentMonday.setDate(currentMonday.getDate() + 7); updateUI(); };
    document.getElementById('today').onclick = () => { currentMonday = getMonday(new Date()); updateUI(); };

    updateUI();
</script>
</body>
</html>
