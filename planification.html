
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saphir | Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --saphir-deep: #0f172a;
            --saphir-blue: #0ea5e9;
            --saphir-light: #38bdf8;
            --saphir-gold: #fbbf24;
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --hour-height: 60px; /* Hauteur d'une heure en pixels */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .calendar-container {
            max-width: 1300px;
            margin: 20px auto;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
        }

        header {
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin: 0; color: var(--saphir-light); }

        /* Schedule Layout */
        .schedule-wrapper {
            display: flex;
            position: relative;
            background: rgba(0,0,0,0.2);
            overflow-x: auto;
        }

        /* Time column (Gutter) */
        .time-gutter {
            width: 60px;
            flex-shrink: 0;
            border-right: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.6);
        }

        .time-slot {
            height: var(--hour-height);
            font-size: 0.7rem;
            color: #94a3b8;
            text-align: center;
            padding-top: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            flex-grow: 1;
            position: relative;
        }

        .day-column {
            position: relative;
            border-right: 1px solid var(--glass-border);
            height: calc(var(--hour-height) * 24); /* 24 heures */
        }

        .day-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #1e293b;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .day-header span { display: block; font-size: 0.65rem; color: var(--saphir-light); text-transform: uppercase; }

        /* Event Positioning */
        .event {
            position: absolute;
            left: 5px;
            right: 5px;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .event.concert { background: rgba(14, 165, 233, 0.3); border-left: 3px solid var(--saphir-blue); }
        .event.singing { background: rgba(251, 191, 36, 0.2); border-left: 3px solid var(--saphir-gold); }

        /* Modal & Buttons (same as before) */
        button { background: var(--glass-border); color: white; border: 1px solid var(--glass-border); padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        button:hover { background: var(--saphir-blue); }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:100; }
        .modal-content { background:#1e293b; padding:30px; border-radius:15px; width:350px; }
        input, select { width:100%; margin: 10px 0; padding:10px; background:#0f172a; border:1px solid #334155; color:white; border-radius:5px; }

        .event {
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}
.event:hover {
    transform: scale(1.02);
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
    filter: brightness(1.1);
}
/* Indication visuelle qu'on peut supprimer */
.event::after {
    content: 'Click to delete';
    display: block;
    font-size: 0.6rem;
    opacity: 0;
    transition: opacity 0.2s;
    text-transform: uppercase;
    margin-top: 4px;
}
.event:hover::after {
    opacity: 0.7;
}
    </style>
</head>
<body>

<div class="calendar-container">
    <header>
        <div class="brand"><h1>Saphir Schedule</h1><div id="currentWeekRange">Loading...</div></div>
        <div class="nav-btns">
            <button id="prevWeek">Prev</button>
            <button id="today">Today</button>
            <button id="nextWeek">Next</button>
            <button id="openModal" style="background:var(--saphir-light); color:#000;">+ Add</button>
        </div>
    </header>

    <div class="schedule-wrapper">
        <div class="time-gutter" id="timeGutter"></div>

        <div class="calendar-grid" id="calendarGrid"></div>
    </div>
</div>

<div id="eventModal" class="modal">
    <div class="modal-content">
        <h2>Add Event</h2>
        <form id="eventForm">
            <input type="text" id="title" placeholder="Event Title" required>
            <input type="date" id="date" required>
            <input type="time" id="time" required>
            <select id="type">
                <option value="concert">Concert</option>
                <option value="singing">Singing Session</option>
            </select>
            <input type="password" id="password" placeholder="Access Key" required>
            <button type="submit" style="width:100%; background:var(--saphir-light); color:#000;">Save</button>
            <button type="button" id="closeModal" style="width:100%; margin-top:10px; background:transparent;">Cancel</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { 
    getFirestore, collection, addDoc, query, where, onSnapshot, getDoc, doc, deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
    apiKey: "AIzaSyDKlg9GOJxXliHqdIWUvGy-XLUh93ceTas",
    authDomain: "planification-b909d.firebaseapp.com",
    projectId: "planification-b909d",
    storageBucket: "planification-b909d.firebasestorage.app",
    messagingSenderId: "548367340058",
    appId: "1:548367340058:web:e4531587c33987a3c8b7a3",
    measurementId: "G-6L5XTTSFL4"
  };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const HOUR_HEIGHT = 60; 

    // Generate Time Gutter
    const gutter = document.getElementById('timeGutter');
    for(let i=0; i<24; i++) {
        gutter.innerHTML += `<div class="time-slot">${i}:00</div>`;
    }

    let currentMonday = getMonday(new Date());

    function getMonday(d) {
        d = new Date(d);
        let day = d.getDay();
        let diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(d.setDate(diff));
    }

    function updateUI() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const endOfWeek = new Date(currentMonday);
        endOfWeek.setDate(endOfWeek.getDate() + 6);
        document.getElementById('currentWeekRange').innerText = `${currentMonday.toLocaleDateString('en-US', {month:'short', day:'numeric'})} - ${endOfWeek.toLocaleDateString('en-US', {month:'short', day:'numeric'})}`;

        for (let i = 0; i < 7; i++) {
            let dayDate = new Date(currentMonday);
            dayDate.setDate(dayDate.getDate() + i);
            let dateStr = dayDate.toISOString().split('T')[0];

            const dayCol = document.createElement('div');
            dayCol.className = 'day-column';
            dayCol.innerHTML = `<div class="day-header"><span>${dayDate.toLocaleDateString('en-US', { weekday: 'short' })}</span><strong>${dayDate.getDate()}</strong></div>`;
            grid.appendChild(dayCol);

            // Listen to events
            const q = query(collection(db, "evenements"), where("date", "==", dateStr));
            onSnapshot(q, (snapshot) => {
                // Clear previous events in this column except header
                const existingEvents = dayCol.querySelectorAll('.event');
                existingEvents.forEach(e => e.remove());

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const [hours, minutes] = data.heure.split(':').map(Number);
                    
                    // Calcul de la position verticale (top)
                    const topPosition = (hours * HOUR_HEIGHT) + (minutes * (HOUR_HEIGHT/60)) + 60; // +60 for header height offset

                    const evEl = document.createElement('div');
                    evEl.className = `event ${data.type}`;
                    evEl.style.top = `${topPosition}px`;
                    evEl.style.height = `50px`; // Hauteur fixe par défaut
                    evEl.innerHTML = `<strong>${data.heure}</strong><br>${data.titre}`;
                    dayCol.appendChild(evEl);
                });
            });
        }

        // Modification dans onSnapshot pour rendre les événements cliquables
    onSnapshot(q, (snapshot) => {
        const container = document.getElementById(`events-${dateStr}`);
        if (!container) return;
        container.innerHTML = ''; 

        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            const eventId = docSnap.id; // On récupère l'ID unique du document
            
            const [hours, minutes] = data.heure.split(':').map(Number);
            const topPosition = (hours * HOUR_HEIGHT) + (minutes * (HOUR_HEIGHT/60)) + 60;

            const evEl = document.createElement('div');
            evEl.className = `event ${data.type}`;
            evEl.style.top = `${topPosition}px`;
            evEl.style.height = `60px`;
            evEl.innerHTML = `<strong>${data.heure}</strong><br>${data.titre}`;
            
            // ACTION AU CLIC : Suppression
            evEl.onclick = () => deleteEvent(eventId, data.titre);
            
            container.appendChild(evEl);
        });
    });
        
    }

    // Fonction de suppression sécurisée
async function deleteEvent(id, title) {
    const inputPass = prompt(`To delete "${title}", please enter the Admin Password:`);
    
    if (inputPass === null) return; // Annulé par l'utilisateur

    try {
        // Vérification du mot de passe dans Firestore
        const configRef = doc(db, "settings", "auth");
        const configSnap = await getDoc(configRef);

        if (configSnap.exists()) {
            const correctPass = configSnap.data().adminKey;

            if (inputPass === correctPass) {
                if (confirm(`Are you sure you want to permanently delete "${title}"?`)) {
                    await deleteDoc(doc(db, "evenements", id));
                    alert("Event deleted.");
                }
            } else {
                alert("Incorrect password. Access denied.");
            }
        }
    } catch (err) {
        console.error("Delete error:", err);
        alert("An error occurred during deletion.");
    }
}
    

    // Modal & Nav Logic (Similaire au précédent...)
    document.getElementById('openModal').onclick = () => document.getElementById('eventModal').style.display = 'flex';
    document.getElementById('closeModal').onclick = () => document.getElementById('eventModal').style.display = 'none';
    
    document.getElementById('eventForm').onsubmit = async (e) => {
        e.preventDefault();
        const inputPass = document.getElementById('password').value;
        const configSnap = await getDoc(doc(db, "settings", "auth"));
        
        if (configSnap.exists() && inputPass === configSnap.data().adminKey) {
            await addDoc(collection(db, "evenements"), {
                titre: document.getElementById('title').value,
                date: document.getElementById('date').value,
                heure: document.getElementById('time').value,
                type: document.getElementById('type').value
            });
            document.getElementById('eventModal').style.display = 'none';
            e.target.reset();
        } else { alert("Wrong Password"); }
    };

    document.getElementById('prevWeek').onclick = () => { currentMonday.setDate(currentMonday.getDate() - 7); updateUI(); };
    document.getElementById('nextWeek').onclick = () => { currentMonday.setDate(currentMonday.getDate() + 7); updateUI(); };
    document.getElementById('today').onclick = () => { currentMonday = getMonday(new Date()); updateUI(); };

    updateUI();
</script>
</body>
</html>
