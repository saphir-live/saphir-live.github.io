<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPHIR LIVE! — MASTER VOTES</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const auth = getAuth();

// Connexion automatique avec tes identifiants (créés dans la console Firebase)
signInWithEmailAndPassword(auth, "zhang.gaetan@gmail.com", "saphirlive2026direct")
  .then(() => {
    console.log("Saphir identifié : Accès Master accordé.");
  })
  .catch((error) => {
    console.error("Erreur d'authentification : ", error.message);
  });
  
  import { getDatabase, ref, set, onValue, push as fbPushItem } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚙️ CONFIGURATION FIREBASE
  const firebaseConfig = {
        apiKey:            "AIzaSyDXOd8Sb_TsiYqwbebCnXTdZGimeheesR4",
        authDomain:        "saphir-live.firebaseapp.com",
        projectId:         "saphir-live",
        storageBucket:     "saphir-live.firebasestorage.app",
        messagingSenderId: "719917557935",
        appId:             "1:719917557935:web:3a7a4e1a846732c1afcc5a",
        measurementId:     "G-VQQ9H234NB",
        databaseURL:       "https://saphir-live-default-rtdb.firebaseio.com"
    };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  
  // Références Firebase
  const lightsRef = ref(db, 'lights');
  const pianoRef  = ref(db, 'piano');

  // État initial
  window.fbState = {
    active: true,
    preset: 'AURORA',
    beamCount: 8,
    speed: 1.0,
    intensity: 0.8,
    color1: '#00d4ff',
    color2: '#ff00ff',
    color3: '#ffffff',
    animMode: 'STARDUST',
    showKeyboard: true,
    currentVote: { active: false }
  };

  // Envoi des données vers Firebase
  window.push = () => {
    set(lightsRef, { ...window.fbState, timestamp: Date.now() });
  };

  // --- LOGIQUE DE VOTE ---
  let currentPollId = 1;
  let voteListener = null;

  // Lancer le vote
  window.masterStartVote = function() {
    const q = document.getElementById('vote-q').value || "Question ?";
    const opts = [
        document.getElementById('opt1').value,
        document.getElementById('opt2').value,
        document.getElementById('opt3').value,
        document.getElementById('opt4').value
    ].filter(o => o.trim() !== "");

    if(opts.length === 0) { alert("Ajoute au moins une option !"); return; }

    window.fbState.currentVote = {
      active: true,
      question: q,
      options: opts,
      sessionId: currentPollId,
      timestamp: Date.now()
    };
    window.push();

    // Configuration visuelle du moniteur
    const monitor = document.getElementById('vote-monitor');
    const list = document.getElementById('results-list');
    monitor.style.display = 'block';
    list.innerHTML = '';

    opts.forEach((opt, i) => {
        list.innerHTML += `
            <div class="vote-result-row">
                <span class="opt-label">${opt}</span>
                <div class="bar-container"><div id="bar-m${i}" class="bar"></div></div>
                <span id="txt-m${i}" class="pct-label">0%</span>
            </div>`;
    });

    // Écoute en temps réel des résultats
    if (voteListener) voteListener(); 
    const resultsRef = ref(db, `votes/session_${currentPollId}`);
    voteListener = onValue(resultsRef, (snap) => {
        const data = snap.val() || {};
        const counts = opts.map((_, i) => data[`m${i+1}`] || 0);
        const total = counts.reduce((a, b) => a + b, 0);

        counts.forEach((count, i) => {
            const pct = total > 0 ? Math.round((count / total) * 100) : 0;
            const bar = document.getElementById(`bar-m${i}`);
            const txt = document.getElementById(`txt-m${i}`);
            if(bar) bar.style.width = pct + '%';
            if(txt) txt.innerText = pct + '%';
        });
    });
  };

  // Arrêter le vote
  window.masterStopVote = function() {
    window.fbState.currentVote = { active: false };
    window.push();
    document.getElementById('vote-monitor').style.display = 'none';
    currentPollId++; 
    document.getElementById('display-session-id').innerText = currentPollId;
  };

  // RÉINITIALISER TOUT (Effacer les enregistrements)
  window.masterResetVotes = function() {
    if (!confirm("Saphir, veux-tu vraiment effacer TOUS les votes de la session " + currentPollId + " ?")) return;
    
    const resultsRef = ref(db, `votes/session_${currentPollId}`);
    set(resultsRef, { m1: 0, m2: 0, m3: 0, m4: 0 }).then(() => {
        console.log("Données effacées.");
        // Remise à zéro visuelle
        for(let i=0; i<4; i++) {
            const bar = document.getElementById(`bar-m${i}`);
            if(bar) bar.style.width = '0%';
            const txt = document.getElementById(`txt-m${i}`);
            if(txt) txt.innerText = '0%';
        }
    });
  };

</script>

<style>
  :root { --neon: #00e5ff; --bg: #0a0a0a; --panel: #151515; --red: #ff4444; }
  body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
  
  /* Sidebar */
  .controls { width: 380px; background: var(--panel); border-right: 1px solid #333; padding: 20px; overflow-y: auto; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
  .control-group { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 18px; margin-bottom: 20px; border: 1px solid #222; }
  .group-title { font-size: 0.75rem; color: var(--neon); letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; border-left: 3px solid var(--neon); padding-left: 10px; }
  
  /* Inputs & Buttons */
  input[type="text"] { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; font-family: inherit; margin-bottom: 10px; }
  input[type="text"]:focus { border-color: var(--neon); outline: none; }
  
  .preset-btn { background: #222; border: 1px solid #444; color: #ccc; padding: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
  .preset-btn:hover { border-color: var(--neon); color: white; background: rgba(0,229,255,0.1); }
  .btn-danger { border-color: var(--red); color: var(--red); background: rgba(255,68,68,0.05); margin-top: 10px; font-size: 0.7rem; width: 100%; }
  .btn-danger:hover { background: var(--red); color: white; }
  
  /* Vote UI */
  .vote-result-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 0.8rem; }
  .opt-label { width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #aaa; }
  .bar-container { flex: 1; background: #000; height: 8px; border-radius: 4px; overflow: hidden; border: 1px solid #333; }
  .bar { height: 100%; background: var(--neon); width: 0%; transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 10px var(--neon); }
  .pct-label { width: 40px; text-align: right; font-weight: bold; color: var(--neon); }

  /* Preview Zone */
  .preview { flex: 1; position: relative; background: radial-gradient(circle at center, #111 0%, #000 100%); display: flex; align-items: center; justify-content: center; }
  .preview-label { color: #333; text-transform: uppercase; letter-spacing: 10px; font-weight: bold; transform: rotate(-5deg); pointer-events: none; }
</style>
</head>
<body>

<div class="controls">
  <div style="text-align: center; margin-bottom: 30px;">
    <h1 style="margin: 0; font-size: 1.5rem; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 15px var(--neon);">SAPHIR</h1>
    <div style="font-size: 0.6rem; color: #666; letter-spacing: 2px;">VOTES</div>
  </div>

  <div class="control-group">
    <div class="group-title">GESTION DU VOTE PUBLIC</div>
    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 15px; color: #888;">
        <span>ÉTAT : <b id="voteStatus">PRÊT</b></span>
        <span>ID SESSION : <b id="display-session-id" style="color:var(--neon)">1</b></span>
    </div>
    
    <input type="text" id="vote-q" placeholder="Question">
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
      <input type="text" id="opt1" placeholder="Option 1">
      <input type="text" id="opt2" placeholder="Option 2">
      <input type="text" id="opt3" placeholder="Option 3">
      <input type="text" id="opt4" placeholder="Option 4">
    </div>

    <div style="display: flex; gap: 8px;">
      <button class="preset-btn" onclick="masterStartVote()" style="flex:2; border-color: var(--neon);">LANCER</button>
      <button class="preset-btn" onclick="masterStopVote()" style="flex:1;">STOP</button>
    </div>

    <button class="preset-btn btn-danger" onclick="masterResetVotes()">
        EFFACER LES ENREGISTREMENTS
    </button>

    <div id="vote-monitor" style="display:none; margin-top:20px; border-top: 1px solid #333; padding-top: 20px;">
      <div id="results-list"></div>
    </div>
  </div>

</div>

<div class="preview">
  <div class="preview-label">PREVIEW</div>
</div>

</body>
</html>
