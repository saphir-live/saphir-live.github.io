<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPHIR LIVE! — MASTER VOTES</title>

<script type="module">
  // 1. TOUS LES IMPORTS EN HAUT
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";  
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // 2. CONFIGURATION
  const firebaseConfig = {
        apiKey:            "AIzaSyDXOd8Sb_TsiYqwbebCnXTdZGimeheesR4",
        authDomain:        "saphir-live.firebaseapp.com",
        projectId:         "saphir-live",
        storageBucket:     "saphir-live.firebasestorage.app",
        messagingSenderId: "719917557935",
        appId:             "1:719917557935:web:3a7a4e1a846732c1afcc5a",
        measurementId:     "G-VQQ9H234NB",
        databaseURL:       "https://saphir-live-default-rtdb.firebaseio.com"
    };

  // 3. INITIALISATION
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const auth = getAuth(app);

  // Variable de sécurité pour empêcher l'envoi si non connecté
  let isConnected = false;

  // 4. AUTHENTIFICATION IMMEDIATE
  signInWithEmailAndPassword(auth, "zhang.gaetan@gmail.com", "saphirlive2026direct")
    .then((userCredential) => {
      console.log("Saphir identifié : Accès Master accordé.");
      isConnected = true;
      document.getElementById('voteStatus').innerText = "CONNECTÉ";
      document.getElementById('voteStatus').style.color = "#00ff00";
    })
    .catch((error) => {
      console.error("Erreur d'authentification : ", error.message);
      alert("Erreur de connexion : " + error.message);
    });

  // Références Firebase
  const lightsRef = ref(db, 'lights');

  // État initial
  window.fbState = {
    active: true,
    preset: 'AURORA',
    beamCount: 8,
    speed: 1.0,
    intensity: 0.8,
    color1: '#00d4ff',
    color2: '#ff00ff',
    color3: '#ffffff',
    animMode: 'STARDUST',
    showKeyboard: true,
    currentVote: { active: false }
  };

  // Fonction d'envoi sécurisée
  window.push = () => {
    if(!isConnected) {
        console.error("Action refusée : Vous n'êtes pas connecté à Firebase.");
        return;
    }
    set(lightsRef, { ...window.fbState, timestamp: Date.now() })
      .catch(err => console.error("Erreur d'envoi Firebase:", err));
  };

  // --- LOGIQUE DE VOTE ---
  let currentPollId = 1;
  let voteListener = null;

  window.masterStartVote = function() {
    const q = document.getElementById('vote-q').value || "Question ?";
    const opts = [
        document.getElementById('opt1').value,
        document.getElementById('opt2').value,
        document.getElementById('opt3').value,
        document.getElementById('opt4').value
    ].filter(o => o.trim() !== "");

    if(opts.length === 0) { alert("Ajoute au moins une option !"); return; }

    window.fbState.currentVote = {
      active: true,
      question: q,
      options: opts,
      sessionId: currentPollId,
      timestamp: Date.now()
    };
    
    window.push();

    const monitor = document.getElementById('vote-monitor');
    const list = document.getElementById('results-list');
    monitor.style.display = 'block';
    list.innerHTML = '';

    opts.forEach((opt, i) => {
        list.innerHTML += `
            <div class="vote-result-row">
                <span class="opt-label">${opt}</span>
                <div class="bar-container"><div id="bar-m${i}" class="bar"></div></div>
                <span id="txt-m${i}" class="pct-label">0%</span>
            </div>`;
    });

    if (voteListener) voteListener(); 
    const resultsRef = ref(db, `votes/session_${currentPollId}`);
    voteListener = onValue(resultsRef, (snap) => {
        const data = snap.val() || {};
        const counts = opts.map((_, i) => data[`m${i+1}`] || 0);
        const total = counts.reduce((a, b) => a + b, 0);

        counts.forEach((count, i) => {
            const pct = total > 0 ? Math.round((count / total) * 100) : 0;
            const bar = document.getElementById(`bar-m${i}`);
            const txt = document.getElementById(`txt-m${i}`);
            if(bar) bar.style.width = pct + '%';
            if(txt) txt.innerText = pct + '%';
        });
    });
  };

  window.masterStopVote = function() {
    window.fbState.currentVote = { active: false };
    window.push();
    document.getElementById('vote-monitor').style.display = 'none';
    currentPollId++; 
    document.getElementById('display-session-id').innerText = currentPollId;
  };

  window.masterResetVotes = function() {
    if (!isConnected) return;
    if (!confirm("Effacer les votes de la session " + currentPollId + " ?")) return;
    
    const resultsRef = ref(db, `votes/session_${currentPollId}`);
    set(resultsRef, { m1: 0, m2: 0, m3: 0, m4: 0 });
  };
</script>

<style>
  :root { --neon: #00e5ff; --bg: #0a0a0a; --panel: #151515; --red: #ff4444; }
  body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
  .controls { width: 380px; background: var(--panel); border-right: 1px solid #333; padding: 20px; overflow-y: auto; }
  .control-group { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 18px; margin-bottom: 20px; border: 1px solid #222; }
  .group-title { font-size: 0.75rem; color: var(--neon); letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; }
  input[type="text"] { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
  .preset-btn { background: #222; border: 1px solid #444; color: #ccc; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
  .btn-danger { border-color: var(--red); color: var(--red); margin-top: 10px; }
  .vote-result-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .bar-container { flex: 1; background: #000; height: 8px; border-radius: 4px; overflow: hidden; }
  .bar { height: 100%; background: var(--neon); width: 0%; transition: width 0.3s; }
  .preview { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; color: #333; }
</style>
</head>
<body>

<div class="controls">
  <div style="text-align: center; margin-bottom: 30px;">
    <h1 style="margin: 0; font-size: 1.5rem; color: var(--neon);">SAPHIR MASTER VOTE</h1>
  </div>

  <div class="control-group">
    <div class="group-title">VOTE PUBLIC</div>
    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 15px;">
        <span>ÉTAT : <b id="voteStatus" style="color: orange;">CONNEXION...</b></span>
        <span>ID : <b id="display-session-id" style="color:var(--neon)">1</b></span>
    </div>
    
    <input type="text" id="vote-q" placeholder="Question">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
      <input type="text" id="opt1" placeholder="Option 1">
      <input type="text" id="opt2" placeholder="Option 2">
      <input type="text" id="opt3" placeholder="Option 3">
      <input type="text" id="opt4" placeholder="Option 4">
    </div>

    <div style="display: flex; gap: 8px;">
      <button class="preset-btn" onclick="masterStartVote()">LANCER</button>
      <button class="preset-btn" onclick="masterStopVote()">STOP</button>
    </div>

    <button class="preset-btn btn-danger" onclick="masterResetVotes()">RÉINITIALISER TOUT</button>

    <div id="vote-monitor" style="display:none; margin-top:20px;">
      <div id="results-list"></div>
    </div>
  </div>
</div>

<div class="preview">PREVIEW MODE</div>

</body>
</html>
