<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAPHIR LIVE ! | PUBLIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00e5ff; --bg: #050505; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            padding: 0; 
            text-align: center; 
            overflow: hidden;
            transition: background-color 0.2s ease-out; /* Plus rapide pour les notes du piano */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- INTERFACE DE VOTE (HÉRITÉE DE VOTE.HTML) --- */
        #vote-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
            opacity: 0;
            transform: translateY(20px);
        }

        #vote-overlay.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        h1 { font-family: 'Cinzel', serif; font-size: 1.8rem; letter-spacing: 4px; margin: 10px 0; color: var(--neon); text-shadow: 0 0 15px rgba(0,229,255,0.5); }
        
        #session-badge {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .vote-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,229,255,0.2);
            padding: 25px;
            border-radius: 15px;
            width: 85%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .option-btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: transparent;
            border: 1px solid var(--neon);
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .option-btn:active { background: var(--neon); color: black; }

        /* --- BOUTON PLEIN ÉCRAN --- */
        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            transition: opacity 0.5s ease;
        }

        /* --- ÉTAT ATTENTE --- */
        #waiting-msg {
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.4;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <button id="fullscreen-btn" onclick="toggleFullScreen()">MODE IMMERSIF</button>

    <div id="waiting-msg">En attente du show...</div>

    <div id="vote-overlay">
        <div id="session-badge">LIVE SESSION</div>
        <h1>VOTEZ</h1>
        <div class="vote-card">
            <p id="vote-question" style="margin-bottom:20px; font-weight:300;">Quelle ambiance pour le prochain morceau ?</p>
            <div id="vote-options">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXOd8Sb_TsiYqwbebCnXTdZGimeheesR4",
            authDomain: "saphir-live.firebaseapp.com",
            projectId: "saphir-live",
            databaseURL: "https://saphir-live-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GESTION DES COULEURS (PIANO) ---
        let fadeTimeout;
        onValue(ref(db, 'piano'), snap => {
            const d = snap.val();
            if (!d) return;

            if (d.lastEvent === 'noteOn' && d.lastColor) {
                document.body.style.backgroundColor = d.lastColor;
                document.getElementById('waiting-msg').style.opacity = '0';
                
                clearTimeout(fadeTimeout);
                fadeTimeout = setTimeout(() => {
                    document.body.style.backgroundColor = '#050505';
                }, 1200); 
            }
        });

        // --- GESTION DES VOTES ---
        onValue(ref(db, 'lights'), snap => {
            const d = snap.val();
            const overlay = document.getElementById('vote-overlay');
            
            if (d && d.currentVote && d.currentVote.active) {
                document.getElementById('vote-question').innerText = d.currentVote.question;
                
                // On ne régénère les boutons que si le timestamp change (nouveau vote)
                const optionsDiv = document.getElementById('vote-options');
                optionsDiv.innerHTML = ''; 
                
                // On crée des options par défaut ou basées sur Firebase
                const choices = d.currentVote.options || ["🔥 ÉNERGIQUE", "✨ ONIRIQUE"];
                choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = choice;
                    btn.onclick = () => sendVote(choice);
                    optionsDiv.appendChild(btn);
                });

                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        });

        window.sendVote = function(choice) {
            const voteRef = ref(db, 'votes_results');
            push(voteRef, {
                choice: choice,
                timestamp: Date.now()
            });
            document.getElementById('vote-overlay').classList.remove('active');
        };

        // --- FULLSCREEN LOGIC (VOTE.HTML) ---
        let fullscreenTimeout;
        function showFullscreenBtn() {
            const btn = document.getElementById('fullscreen-btn');
            btn.style.opacity = "1";
            btn.style.pointerEvents = "auto";
            clearTimeout(fullscreenTimeout);
            fullscreenTimeout = setTimeout(() => {
                if(document.fullscreenElement) {
                    btn.style.opacity = "0";
                    btn.style.pointerEvents = "none";
                }
            }, 3000);
        }

        window.toggleFullScreen = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        };

        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('fullscreen-btn');
            btn.innerText = document.fullscreenElement ? "QUITTER" : "MODE IMMERSIF";
        });

        ['touchstart', 'mousemove'].forEach(evt => 
            document.addEventListener(evt, showFullscreenBtn)
        );
    </script>
</body>
</html>
