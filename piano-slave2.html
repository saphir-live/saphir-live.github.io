<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIANO SLAVE — VISUALIZER</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚙️ CONFIG FIREBASE (DOIT ÊTRE LA MÊME QUE LE MASTER)
  const firebaseConfig = {
        apiKey:            "AIzaSyDXOd8Sb_TsiYqwbebCnXTdZGimeheesR4",
        authDomain:        "saphir-live.firebaseapp.com",
        projectId:         "saphir-live",
        storageBucket:     "saphir-live.firebasestorage.app",
        messagingSenderId: "719917557935",
        appId:             "1:719917557935:web:3a7a4e1a846732c1afcc5a",
        measurementId:     "G-VQQ9H234NB",
        databaseURL:       "https://saphir-live-default-rtdb.firebaseio.com"
    };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const pianoRef = ref(db, 'piano');

  // Stockage local des notes reçues
  window.remoteState = {
    notes: [],
    animation: 'beams',
    energy: 0,
    pedal: false
  };

  // Écoute de Firebase en temps réel
  onValue(pianoRef, (snap) => {
    const data = snap.val();
    if (data) {
      window.remoteState = data;
      // Petit indicateur de réception (optionnel)
      console.log("Data received:", data.notes.length, "notes");
    }
  });
</script>

<style>
  body, html { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    background: #000; overflow: hidden; 
  }
  canvas { 
    display: block; width: 100vw; height: 100vh; 
  }
  #status {
    position: fixed; top: 10px; right: 10px;
    font-family: monospace; color: #333; font-size: 10px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="status">SLAVE ACTIVE</div>
<canvas id="slaveCanvas"></canvas>

<script>
const canvas = document.getElementById('slaveCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function render() {
  // Effet de traînée (Motion Blur)
  ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const state = window.remoteState || { notes: [], animation: 'beams', energy: 0 };
  const notes = state.notes || [];
  const anim = state.animation || 'beams';

  notes.forEach(n => {
    // Calcul de la position X (basé sur 88 touches, de 21 à 108)
    const x = ((n.note - 21) / 88) * canvas.width;
    const velocity = n.velocity || 100;
    
    if (anim === 'beams') {
      drawBeam(x, velocity);
    } else if (anim === 'aurora') {
      drawAurora(x, velocity);
    } else {
      drawParticles(x, velocity);
    }
  });

  requestAnimationFrame(render);
}

function drawBeam(x, vel) {
  const h = (vel / 127) * canvas.height * 0.8;
  const w = (canvas.width / 88) * 0.9;
  
  const grd = ctx.createLinearGradient(x, canvas.height, x, canvas.height - h);
  grd.addColorStop(0, '#00e5ff');
  grd.addColorStop(1, 'transparent');
  
  ctx.fillStyle = grd;
  ctx.shadowBlur = 15;
  ctx.shadowColor = '#00e5ff';
  ctx.fillRect(x, canvas.height - h, w, h);
  ctx.shadowBlur = 0;
}

function drawAurora(x, vel) {
  const h = (vel / 127) * canvas.height;
  ctx.beginPath();
  ctx.strokeStyle = '#ff4d6d';
  ctx.lineWidth = 2;
  ctx.moveTo(x, canvas.height);
  ctx.bezierCurveTo(x - 50, canvas.height/2, x + 50, canvas.height/4, x, canvas.height - h);
  ctx.stroke();
}

function drawParticles(x, vel) {
    ctx.fillStyle = '#ffab00';
    for(let i=0; i<3; i++) {
        const py = Math.random() * canvas.height;
        ctx.beginPath();
        ctx.arc(x, py, (vel/127)*5, 0, Math.PI*2);
        ctx.fill();
    }
}

// Lancement de la boucle
render();
</script>
</body>
</html>
