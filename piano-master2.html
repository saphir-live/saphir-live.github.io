<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PIANO MASTER 2</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ REMPLACE PAR TES VRAIES CLÉS ICI
        const firebaseConfig = {
        apiKey:            "AIzaSyDXOd8Sb_TsiYqwbebCnXTdZGimeheesR4",
        authDomain:        "saphir-live.firebaseapp.com",
        projectId:         "saphir-live",
        storageBucket:     "saphir-live.firebasestorage.app",
        messagingSenderId: "719917557935",
        appId:             "1:719917557935:web:3a7a4e1a846732c1afcc5a",
        measurementId:     "G-VQQ9H234NB",
        databaseURL:       "https://saphir-live-default-rtdb.firebaseio.com"
    };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pianoRef = ref(db, 'piano');

        window.sendToFirebase = (state) => {
            set(pianoRef, { ...state, timestamp: Date.now() });
        };
    </script>
    <style>
        body { margin: 0; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        canvas { width: 100vw; height: 60vh; display: block; background: #050505; }
        .controls { height: 40vh; border-top: 1px solid #333; padding: 20px; }
        .key { display: inline-block; width: 40px; height: 150px; border: 1px solid #000; background: white; cursor: pointer; }
        .key.active { background: #00e5ff; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="controls">
    <h2>PIANO MASTER - TEST VISUEL</h2>
    <p>Clique sur les touches si le MIDI n'est pas branché :</p>
    <div id="keyboard"></div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let activeNotes = new Map();

    // Redimensionnement
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight * 0.6; }
    window.onresize = resize; resize();

    // Création clavier test
    const kbd = document.getElementById('keyboard');
    for(let i=60; i<72; i++) {
        const btn = document.createElement('div');
        btn.className = 'key';
        btn.onmousedown = () => noteOn(i, 100);
        btn.onmouseup = () => noteOff(i);
        kbd.appendChild(btn);
    }

    function noteOn(note, vel) {
        activeNotes.set(note, vel);
        update();
    }

    function noteOff(note) {
        activeNotes.delete(note);
        update();
    }

    function update() {
        const notesArray = Array.from(activeNotes.entries()).map(([n, v]) => ({note: n, velocity: v}));
        if(window.sendToFirebase) {
            window.sendToFirebase({ notes: notesArray, animation: 'beams' });
        }
    }

    function render() {
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(0,0,canvas.width, canvas.height);
        
        activeNotes.forEach((vel, note) => {
            const x = ((note - 21) / 88) * canvas.width;
            ctx.fillStyle = '#00e5ff';
            ctx.fillRect(x, canvas.height, 20, -vel * 2);
        });
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
