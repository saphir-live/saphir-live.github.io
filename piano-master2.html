<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PIANO MASTER 2</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ REMPLACE PAR TES VRAIES CLÉS ICI
        const firebaseConfig = {
        apiKey:            "AIzaSyDXOd8Sb_TsiYqwbebCnXTdZGimeheesR4",
        authDomain:        "saphir-live.firebaseapp.com",
        projectId:         "saphir-live",
        storageBucket:     "saphir-live.firebasestorage.app",
        messagingSenderId: "719917557935",
        appId:             "1:719917557935:web:3a7a4e1a846732c1afcc5a",
        measurementId:     "G-VQQ9H234NB",
        databaseURL:       "https://saphir-live-default-rtdb.firebaseio.com"
    };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pianoRef = ref(db, 'piano');

        window.sendToFirebase = (state) => {
            set(pianoRef, { ...state, timestamp: Date.now() });
        };
    </script>
    <style>
        body { margin: 0; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        canvas { width: 100vw; height: 60vh; display: block; background: #050505; }
        .controls { height: 40vh; border-top: 1px solid #333; padding: 20px; }
        .key { display: inline-block; width: 40px; height: 150px; border: 1px solid #000; background: white; cursor: pointer; }
        .key.active { background: #00e5ff; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="controls">
    <h2>PIANO MASTER - TEST VISUEL</h2>
    <p>Clique sur les touches si le MIDI n'est pas branché :</p>
    <div id="keyboard"></div>
</div>

<script>
    const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const log = document.getElementById('log');

// Utilisation d'une Map pour gérer plusieurs notes simultanément
let activeNotes = new Map();

// Initialisation du clavier 
function initKeyboard() {
    const kbd = document.getElementById('keyboard');
    kbd.innerHTML = ''; // Nettoie le clavier existant
    
    // On crée 24 touches pour le test (2 octaves)
    for(let i = 60; i <= 84; i++) {
        const k = document.createElement('div');
        k.className = 'key';
        k.dataset.note = i;
        
        // Gère le clic Souris
        k.onmousedown = () => handleNoteOn(i, 100);
        k.onmouseup = () => handleNoteOff(i);
        k.onmouseleave = () => { if(isMouseDown) handleNoteOff(i); };
        
        kbd.appendChild(k);
    }
}

function handleNoteOn(note, vel) {
    if (activeNotes.has(note)) return; // Empêche les doublons
    
    activeNotes.set(note, vel);
    const keyEl = document.querySelector(`.key[data-note="${note}"]`);
    if(keyEl) keyEl.classList.add('active');
    
    log.textContent = "Notes actives : " + Array.from(activeNotes.keys()).join(', ');
    sync();
}

function handleNoteOff(note) {
    if (!activeNotes.has(note)) return;
    
    activeNotes.delete(note);
    const keyEl = document.querySelector(`.key[data-note="${note}"]`);
    if(keyEl) keyEl.classList.remove('active');
    
    log.textContent = activeNotes.size > 0 ? 
        "Notes actives : " + Array.from(activeNotes.keys()).join(', ') : 
        "Aucune note";
    sync();
}

// Fonction de synchronisation CRITIQUE
function sync() {
    // On transforme la Map en un TABLEAU d'objets pour Firebase
    const notesArray = [];
    activeNotes.forEach((vel, note) => {
        notesArray.push({
            note: note,
            velocity: vel
        });
    });

    if(window.sendToFirebase) {
        window.sendToFirebase({ 
            notes: notesArray, 
            animation: 'beams',
            timestamp: Date.now() 
        });
    }
}

// Boucle de rendu (Visualisation locale)
function draw() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    
    ctx.fillStyle = 'black';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // On dessine TOUTES les notes présentes dans la Map
    activeNotes.forEach((vel, note) => {
        const x = ((note - 21) / 88) * canvas.width;
        const w = (canvas.width / 88) * 0.8;
        
        ctx.fillStyle = '#00e5ff';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00e5ff';
        ctx.fillRect(x, canvas.height, w, -(vel / 127) * canvas.height);
    });
    
    requestAnimationFrame(draw);
}

// Lancement
let isMouseDown = false;
window.addEventListener('mousedown', () => isMouseDown = true);
window.addEventListener('mouseup', () => isMouseDown = false);

initKeyboard();
draw();
</script>
</body>
</html>
