<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PIANO MASTER — FIX</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
        apiKey:            "AIzaSyDXOd8Sb_TsiYqwbebCnXTdZGimeheesR4",
        authDomain:        "saphir-live.firebaseapp.com",
        projectId:         "saphir-live",
        storageBucket:     "saphir-live.firebasestorage.app",
        messagingSenderId: "719917557935",
        appId:             "1:719917557935:web:3a7a4e1a846732c1afcc5a",
        measurementId:     "G-VQQ9H234NB",
        databaseURL:       "https://saphir-live-default-rtdb.firebaseio.com"
    };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            window.pianoRef = ref(db, 'piano');
            console.log("Firebase connecté");
        } catch (e) { console.error("Erreur Firebase:", e); }

        window.sendToFirebase = (data) => {
            if (window.pianoRef) {
                set(window.pianoRef, { ...data, timestamp: Date.now() });
            }
        };
    </script>
    <style>
        :root { --cyan: #00e5ff; --bg: #03030a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        canvas { width: 100%; height: 50vh; background: #000; display: block; }
        .kbd-container { height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a18; }
        .keyboard { display: flex; padding: 20px; background: #000; border-radius: 10px; border: 1px solid #222; }
        .key { width: 30px; height: 120px; background: #fff; border: 1px solid #000; cursor: pointer; border-radius: 0 0 5px 5px; }
        .key.active { background: var(--cyan); box-shadow: 0 0 15px var(--cyan); transform: translateY(2px); }
        #status { padding: 10px; font-family: monospace; color: var(--cyan); }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="kbd-container">
    <div id="status">En attente d'interaction...</div>
    <div class="keyboard" id="keyboard"></div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const activeNotes = new Map();
    let isMouseDown = false;

    // Création des touches de test (Octave 3 et 4)
    const kbd = document.getElementById('keyboard');
    for(let i=48; i<=72; i++) {
        const k = document.createElement('div');
        k.className = 'key';
        k.dataset.note = i;
        
        k.onmousedown = () => { isMouseDown = true; noteOn(i); };
        k.onmouseenter = () => { if(isMouseDown) noteOn(i); };
        k.onmouseup = () => { isMouseDown = false; noteOff(i); };
        k.onmouseleave = () => { if(isMouseDown) noteOff(i); };
        
        kbd.appendChild(k);
    }
    window.onmouseup = () => { isMouseDown = false; };

    function noteOn(note) {
        if (activeNotes.has(note)) return;
        activeNotes.set(note, 100);
        updateUI();
    }

    function noteOff(note) {
        activeNotes.delete(note);
        updateUI();
    }

    function updateUI() {
        // 1. Allumer les touches visuelles
        document.querySelectorAll('.key').forEach(k => {
            const n = parseInt(k.dataset.note);
            if (activeNotes.has(n)) k.classList.add('active');
            else k.classList.remove('active');
        });

        // 2. Préparer les données pour Firebase
        const notesArray = Array.from(activeNotes.entries()).map(([n, v]) => ({ note: n, velocity: v }));
        status.textContent = "Notes : " + notesArray.map(n => n.note).join(', ');

        // 3. Envoyer
        if (window.sendToFirebase) {
            window.sendToFirebase({ notes: notesArray, animation: 'beams' });
        }
    }

    function render() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(0,0,canvas.width, canvas.height);

        activeNotes.forEach((vel, note) => {
            const x = ((note - 21) / 88) * canvas.width;
            ctx.fillStyle = '#00e5ff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00e5ff';
            ctx.fillRect(x, canvas.height, 15, -vel * 2);
        });
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
