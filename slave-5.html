<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚙️ MÊME CONFIG QUE MASTER
  const firebaseConfig = {
        apiKey:            "AIzaSyDXOd8Sb_TsiYqwbebCnXTdZGimeheesR4",
        authDomain:        "saphir-live.firebaseapp.com",
        projectId:         "saphir-live",
        storageBucket:     "saphir-live.firebasestorage.app",
        messagingSenderId: "719917557935",
        appId:             "1:719917557935:web:3a7a4e1a846732c1afcc5a",
        measurementId:     "G-VQQ9H234NB",
        databaseURL:       "https://saphir-live-default-rtdb.firebaseio.com"
    };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // Lights state (beams)
  //onValue(ref(db,'lights'), snap => {
  //  const d=snap.val();
  //  if(d){ window.lightState=d; syncDot(); }
  //});
  onValue(ref(db,'lights'), snap => {
  const d = snap.val();
  if(d){ 
    window.lightState = d; 
    
    // Gestion de l'affichage du clavier
    const kbContainer = document.getElementById('kb-slave');
    if(kbContainer) {
      kbContainer.style.display = (d.showKeyboard !== false) ? 'block' : 'none';
    }
    
    syncDot();
  }
});

  // Piano state (notes + animation mode)
  onValue(ref(db, 'piano'), snap => {
  const d = snap.val();
  if (!d) return;
  const prev = window.pianoState || {};
  window.pianoState = d;

  // Mise à jour de l'affichage HUD si le mode a changé
  if(d.animMode && d.animMode !== prev.animMode) {
    updateHUD(d);
  }

  // Déclenchement de l'animation sur réception d'une note
  if(d.lastEvent === 'noteOn' && d.lastNote && d.timestamp !== prev.timestamp){
    // On utilise la vélocité reçue ou une valeur par défaut de 80
    const vel = d.lastVelocity || 80;
    const color = d.lastColor || '#00d4ff';
    window._onNoteOn && window._onNoteOn(d.lastNote, vel, color);
  }
  
  syncDot();
});

  function syncDot(){
    const el=document.getElementById('syncDot');
    if(el){ el.style.background='#00ff88'; setTimeout(()=>el.style.background='#00e5ff',250); }
  }
  function updateHUD(d){
    const el=document.getElementById('hudAnim');
    if(el) el.textContent=(d.animMode||'—').toUpperCase();
    const el2=document.getElementById('hudNote');
    const names=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    if(el2&&d.lastNote) el2.textContent=names[d.lastNote%12]+(Math.floor(d.lastNote/12)-1);
  }
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

<script>
// ══════════════════════════════════════════════
//  CANVAS + RESIZE
// ══════════════════════════════════════════════
const stage = document.getElementById('stage');
const ctx   = stage.getContext('2d');
let W=0, H=0, KB_H=110;

function resize(){
  W=stage.width=window.innerWidth;
  H=stage.height=window.innerHeight;
}
resize(); window.addEventListener('resize',resize);

// ══════════════════════════════════════════════
//  STATE DEFAULTS
// ══════════════════════════════════════════════
window.lightState = window.lightState || {
  preset:'sweep', speed:3, color1:'#ffffff', color2:'#00d4ff', color3:'#ff6b00',
  beamCount:4, glowIntensity:80, active:true, animMode:'beams'
};
window.pianoState = window.pianoState || { activeNotes:{}, animMode:'beams', title:'SAPHIR LIVE!' };

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function hexA(hex, a){
  if(!hex||hex[0]!=='#') return `rgba(0,212,255,${a})`;
  return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;
}

// ══════════════════════════════════════════════
//  KEYBOARD SLAVE — 88 TOUCHES MIROIR
// ══════════════════════════════════════════════
const kbS  = document.getElementById('kb-slave-canvas');
const kbSC = kbS.getContext('2d');
kbS.addEventListener('mousedown', e => {
  const rect = kbS.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  // Logique de détection de la note (identique à votre buildSlaveLayout)
  // ... (trouver la note 'n')
  
  if(n) {
     window._onNoteOn && window._onNoteOn(n, 90, '#00d4ff');
  }
});
const BLACK_SEM = new Set([1,3,6,8,10]);
function isBlack(n){ return BLACK_SEM.has(n%12); }

const ALL_NOTES=[]; for(let n=21;n<=108;n++) ALL_NOTES.push(n);
const WHITE_NOTES=ALL_NOTES.filter(n=>!isBlack(n));
let slaveWhiteKeys=[], slaveBlackKeys=[];

function buildSlaveLayout(W2,H2){
  slaveWhiteKeys=[]; slaveBlackKeys=[];
  const ww=W2/WHITE_NOTES.length;
  const wX=new Map();
  let wi=0;
  ALL_NOTES.forEach(n=>{ if(!isBlack(n)){ wX.set(n,wi*ww); wi++; } });
  WHITE_NOTES.forEach((n,i)=>slaveWhiteKeys.push({note:n,x:i*ww,w:ww,h:H2}));
  ALL_NOTES.forEach(n=>{
    if(isBlack(n)&&wX.has(n-1)){
      const bw=ww*0.58, bh=H2*0.63;
      slaveBlackKeys.push({note:n,x:wX.get(n-1)+ww-bw*0.45,w:bw,h:bh});
    }
  });
}

function drawSlaveKb(){
  const W2=kbS.width, H2=kbS.height;
  if(!W2||!H2) return;
  buildSlaveLayout(W2,H2);
  kbSC.clearRect(0,0,W2,H2);

  const active = window.pianoState?.activeNotes||{};

  slaveWhiteKeys.forEach(k=>{
    const a=active[k.note];
    kbSC.save();
    if(a){ kbSC.fillStyle=a.color||'#00d4ff'; kbSC.shadowBlur=22; kbSC.shadowColor=a.color||'#00d4ff'; }
    else   kbSC.fillStyle='#e8e8e8';
    kbSC.fillRect(k.x+0.5,0,k.w-1,k.h);
    kbSC.strokeStyle='#2a2a2a'; kbSC.lineWidth=0.5;
    kbSC.strokeRect(k.x+0.5,0,k.w-1,k.h);
    if(k.note%12===0){
      kbSC.fillStyle=a?'#000':'#666';
      kbSC.font=`${Math.max(6,k.w*0.38)}px monospace`;
      kbSC.textAlign='center'; kbSC.shadowBlur=0;
      kbSC.fillText('C'+(Math.floor(k.note/12)-1),k.x+k.w/2,k.h-4);
    }
    kbSC.restore();
  });
  slaveBlackKeys.forEach(k=>{
    const a=active[k.note];
    kbSC.save();
    if(a){ kbSC.fillStyle=a.color||'#00d4ff'; kbSC.shadowBlur=18; kbSC.shadowColor=a.color||'#00d4ff'; }
    else   kbSC.fillStyle='#111';
    kbSC.fillRect(k.x,0,k.w,k.h);
    kbSC.strokeStyle='#000'; kbSC.lineWidth=0.5;
    kbSC.strokeRect(k.x,0,k.w,k.h);
    kbSC.restore();
  });
}

function resizeKbS(){
  kbS.width=window.innerWidth; kbS.height=KB_H; drawSlaveKb();
}
window.addEventListener('resize',resizeKbS);
setTimeout(resizeKbS,80);
setInterval(drawSlaveKb,40);

// ══════════════════════════════════════════════
//  SAPHIR ANIMATIONS ENGINE
// ══════════════════════════════════════════════
let items=[], particles=[];
let titleScale=1, titleHue=200;
let currentBgHue=240, targetBgHue=240, bgIntensity=0, flashWhite=0;

// Stars for galaxy/gravity
const STARS=[];
function initStars(){
  for(let i=0;i<400;i++) STARS.push({x:(Math.random()-0.5)*2000,y:(Math.random()-0.5)*2000,z:Math.random()*2000,px:0,py:0});
}
initStars();
function initParticles(){
  particles=[];
  for(let i=0;i<1200;i++) particles.push({x:Math.random()*W,y:Math.random()*H,vx:0,vy:0,hue:Math.random()*360,size:Math.random()*2+1});
}
initParticles();
window.addEventListener('resize',initParticles);

// ── BEAMS (mode beams) ──
function drawBeamFull(cx,cy,angleDeg,color,glowIntensity){
  const H2=H, W2=W;
  const len=Math.sqrt(W2*W2+H2*H2);
  const rad=angleDeg*Math.PI/180;
  const ex=cx+Math.cos(rad)*len, ey=cy+Math.sin(rad)*len;
  const gm=glowIntensity/100;
  // Outer halo
  const g2=ctx.createLinearGradient(cx,cy,ex,ey);
  g2.addColorStop(0,hexA(color,0.08*gm)); g2.addColorStop(0.4,hexA(color,0.04*gm)); g2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.save(); ctx.strokeStyle=g2; ctx.lineWidth=80+gm*60; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(ex,ey); ctx.stroke(); ctx.restore();
  // Mid
  const g1=ctx.createLinearGradient(cx,cy,ex,ey);
  g1.addColorStop(0,hexA(color,0.5*gm)); g1.addColorStop(0.6,hexA(color,0.15*gm)); g1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.save(); ctx.shadowBlur=20*gm; ctx.shadowColor=color;
  ctx.strokeStyle=g1; ctx.lineWidth=14+gm*10; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(ex,ey); ctx.stroke(); ctx.restore();
  // Core
  const g0=ctx.createLinearGradient(cx,cy,ex,ey);
  g0.addColorStop(0,hexA(color,0.95)); g0.addColorStop(0.7,hexA(color,0.5)); g0.addColorStop(1,'rgba(0,0,0,0)');
  ctx.save(); ctx.shadowBlur=40*gm; ctx.shadowColor=color;
  ctx.strokeStyle=g0; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(ex,ey); ctx.stroke(); ctx.restore();
  // Source burst
  const sr=ctx.createRadialGradient(cx,cy,0,cx,cy,60+gm*40);
  sr.addColorStop(0,hexA(color,0.7*gm)); sr.addColorStop(0.3,hexA(color,0.3*gm)); sr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.save(); ctx.fillStyle=sr; ctx.beginPath(); ctx.arc(cx,cy,100*gm,0,Math.PI*2); ctx.fill(); ctx.restore();
}

function getBeamPositions(count){
  const pos=[];
  if(count===1)  return [{x:W/2,y:H+10}];
  if(count===2)  return [{x:W*.25,y:H+10},{x:W*.75,y:H+10}];
  if(count===3)  return [{x:W*.1,y:H+10},{x:W*.5,y:H+10},{x:W*.9,y:H+10}];
  if(count===4)  return [{x:W*.12,y:H+10},{x:W*.38,y:H+10},{x:W*.62,y:H+10},{x:W*.88,y:H+10}];
  if(count===6)  { for(let i=0;i<6;i++) pos.push({x:W*(0.1+i*0.16),y:H+10}); return pos; }
  for(let i=0;i<count;i++) pos.push({x:W*((i+1)/(count+1)),y:H+10});
  return pos;
}

function getBeamAngle(preset,index,count,t){
  switch(preset){
    case 'sweep':  return -90+Math.sin(t+index*0.9)*50;
    case 'pulse':  return -90+(index-(count-1)/2)*(40/Math.max(count-1,1))+Math.sin(t*2+index*0.5)*10;
    case 'strobe': return -90+(Math.floor(t*4+index*1.7)%7-3)*18;
    case 'orbit':  return (t*60+index*(360/count))%360-270;
    case 'fan':    return -90+(index-(count-1)/2)*(80/Math.max(count-1,1))+Math.sin(t*0.8)*5;
    case 'chase':  return -90+Math.sin(t*1.8+index*1.3)*60;
    default:       return -90+Math.sin(t+index)*45;
  }
}

// ── SAPHIR trigger (called on noteOn) ──
window._onNoteOn = function(note, velocity, color) {
  const mode = (window.pianoState?.animMode)||(window.lightState?.animMode)||'beams';
  const hue  = (note%12)*30;
  targetBgHue=hue; bgIntensity=Math.min(1.0,velocity/100+0.2);
  flashWhite=velocity/127; titleScale=1.2; titleHue=hue;

  if (mode==='gravity'){
    const cx=((note-21)/87)*W;
    particles.forEach(p=>{ const dx=cx-p.x, dy=(H-KB_H-60)-p.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<400){ p.vx+=(dx/d)*(velocity/8); p.vy+=(dy/d)*(velocity/8); p.hue=hue; } });
  } else if (mode==='immersion'){
    items.push({type:'beam',x:((note-21)/87)*W,y:H-KB_H-10,w:10,hue,opacity:1});
  } else if (mode==='staff'){
    items.push({type:'musical_note',x:W,y:(H-KB_H)/2-(note-60)*10,size:18,hue,opacity:1});
  } else if (mode==='flowers'){
    items.push({type:'flower',x:((note-21)/87)*W,y:H-KB_H-10,size:0,maxSize:30+(velocity/1.5),hue,opacity:1,speedY:1+Math.random()});
  } else if (mode==='hearts'){
    items.push({type:'hearts',x:((note-21)/87)*W,y:H-KB_H-10,size:0,maxSize:20+(velocity/127)*50,hue,opacity:1,speedY:0.5+Math.random()});
  } else if (mode==='lightTrail'){
    items.push({type:'lightTrail',x:((note-21)/87)*W,y:(H-KB_H)*0.4+(Math.random()*(H-KB_H)*0.2),note,size:0,maxSize:5+(velocity/127)*15,hue,opacity:1,life:1.0});
  } else if (mode==='neonRain'){
    const cx=((note-21)/87)*W;
    items.push({type:'neonRain',x:cx,y:-100,targetY:H-KB_H-10,width:8,height:40+(velocity/127)*100,hue,speed:5+(velocity/127)*8,opacity:1,hit:false});
  } else if (mode==='aurora'){
    items.push({type:'aurora',x:((note-21)/87)*W,y:H-KB_H-10,hue,width:20+(velocity/127)*40,opacity:0.6,points:[],waveOffset:Math.random()*Math.PI*2,speedY:1+(velocity/127)*1.5});
  } else if (mode==='fireworks'){
    const sx=((note-21)/87)*W, sy=H-KB_H-10;
    const cnt=15+Math.floor((velocity/127)*25);
    for(let i=0;i<cnt;i++){
      const ang=Math.random()*Math.PI*2, spd=1+Math.random()*3;
      items.push({type:'firework_part',x:sx,y:sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-(velocity/20),hue,size:2+Math.random()*3,opacity:1,gravity:0.15});
    }
  } else if (mode==='galaxy'){
    bgIntensity=0.8;
    items.push({type:'supernova',x:W/2+(Math.random()-0.5)*200,y:(H-KB_H)/2+(Math.random()-0.5)*200,r:20+velocity/2,hue,opacity:1});
  } else if (mode==='waves'){
    items.push({type:'wave',note,hue,velocity,timestamp:Date.now()});
  } else if (mode==='spiral'){
    items.push({type:'spiral',note,hue,velocity,timestamp:Date.now()});
  } else if (mode==='explosion'){
    items.push({type:'explosion',note,hue,velocity,timestamp:Date.now()});
  } else if (mode==='tunnel'){
    items.push({type:'tunnel',note,hue,velocity,timestamp:Date.now()});
  } else if (mode==='plasma'){
    items.push({type:'plasma',note,hue,velocity,timestamp:Date.now()});
  } else if (mode==='lightning'){
    items.push({type:'lightning',x:((note-21)/87)*W,y:0,targetY:H-KB_H-10,hue,velocity,timestamp:Date.now()});
  } else if (mode==='ripple'){
    items.push({type:'ripple',x:((note-21)/87)*W,y:(H-KB_H)/2,note,hue,velocity,timestamp:Date.now(),maxRadius:0});
  } else if (mode==='spectrum'){
    items.push({type:'spectrum',note,hue,velocity,timestamp:Date.now()});
  } else if (mode==='fire'){
    items.push({type:'fire',note,x:((note-21)/87)*W,y:H-KB_H-10,hue,velocity,timestamp:Date.now()});
  }
};

// ══════════════════════════════════════════════
//  DUST PARTICLES (for beams)
// ══════════════════════════════════════════════
class Dust {
  constructor(){ this.reset(); }
  reset(){ this.x=Math.random()*W; this.y=H+Math.random()*40; this.vy=-(0.5+Math.random()*1.5); this.vx=(Math.random()-0.5)*0.5; this.life=0; this.maxLife=80+Math.random()*120; this.size=0.5+Math.random()*2; this.color='#fff'; }
  update(){ this.x+=this.vx; this.y+=this.vy; this.life++; if(this.life>this.maxLife||this.y<0) this.reset(); }
  draw(){ const a=Math.sin((this.life/this.maxLife)*Math.PI)*0.35; ctx.save(); ctx.globalAlpha=a; ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); ctx.restore(); }
}
const DUST=Array.from({length:100},()=>new Dust());

// ══════════════════════════════════════════════
//  MAIN RENDER LOOP
// ══════════════════════════════════════════════
let t=0, lastT=0;
const cH = H => H - KB_H; // canvas content height

function mainRender(ts){
  requestAnimationFrame(mainRender);
  const dt=(ts-lastT)/1000; lastT=ts;
  t += (parseFloat(window.lightState?.speed||3)*0.025);

  const ls  = window.lightState || {};
  const ps  = window.pianoState || {};
  const mode = ps.animMode || ls.animMode || 'beams';
  const contentH = H - KB_H;

  // ── OFFLINE ──
  const off=document.getElementById('offlineScreen');
  if (!ls.active && mode==='beams'){ off.style.display='flex'; return; }
  else off.style.display='none';

  // ── CLEAR / BASE BACKGROUND ──
  if(mode==='galaxy'){
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    // Stars
    const speed=1+(bgIntensity*10);
    STARS.forEach(s=>{
      s.z-=speed; if(s.z<=1){ s.z=2000; s.x=(Math.random()-0.5)*2000; s.y=(Math.random()-0.5)*2000; }
      const sx=W/2+(s.x/s.z)*1000, sy=contentH/2+(s.y/s.z)*1000;
      if(s.px!==0){ ctx.strokeStyle=`rgba(255,255,255,${1-s.z/2000})`; ctx.lineWidth=2*(1-s.z/2000); ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(s.px,s.py); ctx.stroke(); }
      s.px=sx; s.py=sy;
    });
  } else if(mode==='bgMode'){
    let diff=targetBgHue-currentBgHue; if(Math.abs(diff)>180) diff-=Math.sign(diff)*360; currentBgHue+=diff*0.1;
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    const gr=ctx.createRadialGradient(W/2,contentH/2,0,W/2,contentH/2,W*0.7);
    gr.addColorStop(0,`hsla(${currentBgHue},100%,50%,${bgIntensity})`); gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
    if(flashWhite>0){ ctx.fillStyle=`rgba(255,255,255,${flashWhite*0.4})`; ctx.fillRect(0,0,W,H); flashWhite*=0.85; }
    if(bgIntensity>0.1) bgIntensity*=0.97;
  } else {
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(0,0,W,H);
  }

  // ── GRAVITY PARTICLES ──
  if(mode==='gravity'){
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(0,0,W,H);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.vy+=0.01;
      ctx.save(); ctx.shadowBlur=40; ctx.shadowColor=`hsl(${p.hue},100%,70%)`; ctx.fillStyle=`hsl(${p.hue},100%,85%)`;
      ctx.globalAlpha=0.3; ctx.beginPath(); ctx.arc(p.x+p.size/2,p.y+p.size/2,p.size*2,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.shadowBlur=60; ctx.fillRect(p.x,p.y,p.size,p.size); ctx.restore();
      if(p.x<0||p.x>W) p.vx*=-1; if(p.y<0||p.y>H) p.vy*=-1;
    });
  }

  // ── TITLE MODE ──
  if(mode==='titleMode'){
    ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=25*titleScale; ctx.shadowColor=`hsl(${titleHue},100%,50%)`;
    ctx.fillStyle='white'; ctx.font=`bold ${Math.min(65*titleScale,contentH*0.3)}px Arial`;
    ctx.fillText((ps.title||ls.title||'SAPHIR LIVE!').toUpperCase(),W/2,contentH/2);
    if(titleScale>1) titleScale-=0.01;
    ctx.restore();
  }

  // ── BEAMS MODE ──
  if(mode==='beams'){
    ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(0,0,W,H);
    const count=parseInt(ls.beamCount||4);
    const colors=[ls.color1||'#fff',ls.color2||'#00d4ff',ls.color3||'#ff6b00'];
    const glow=parseInt(ls.glowIntensity||80);
    const positions=getBeamPositions(count);
    const angles=positions.map((_,i)=>getBeamAngle(ls.preset,i,count,t));
    // Floor reflections
    positions.forEach((pos,i)=>{
      const rg=ctx.createRadialGradient(pos.x,contentH,0,pos.x,contentH,80*(glow/100));
      rg.addColorStop(0,hexA(colors[i%3],0.25*(glow/100))); rg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.save(); ctx.fillStyle=rg; ctx.beginPath(); ctx.ellipse(pos.x,contentH,80*(glow/100),30*(glow/100),0,0,Math.PI*2); ctx.fill(); ctx.restore();
    });
    // Dust
    DUST.forEach(p=>{ p.color=colors[Math.floor(Math.random()*3)]; p.update(); p.draw(); });
    // Beams
    positions.forEach((pos,i)=>drawBeamFull(pos.x,pos.y,angles[i],colors[i%3],glow));
    // Vignette
    const vign=ctx.createRadialGradient(W/2,contentH/2,contentH*0.3,W/2,contentH/2,contentH*0.9);
    vign.addColorStop(0,'rgba(0,0,0,0)'); vign.addColorStop(1,'rgba(0,0,0,0.55)');
    ctx.fillStyle=vign; ctx.fillRect(0,0,W,contentH);
  }

  // ── SAPHIR ITEMS ──
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    if(it.type==='beam'){
      it.y-=3; it.opacity-=0.015;
      ctx.save(); ctx.shadowBlur=60; ctx.shadowColor=`hsl(${it.hue},100%,60%)`; ctx.fillStyle=`hsla(${it.hue},100%,75%,${it.opacity})`; ctx.fillRect(it.x-it.w/2,it.y,it.w,60); ctx.restore();
    }
    if(it.type==='musical_note'){
      it.x-=2; if(it.x<100) it.opacity-=0.02;
      ctx.save(); ctx.translate(it.x,it.y); ctx.globalAlpha=it.opacity; ctx.shadowBlur=40; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.fillStyle=`hsl(${it.hue},100%,85%)`;
      ctx.beginPath(); ctx.ellipse(0,0,12,8,-Math.PI/6,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=50; ctx.fillRect(10,0,3,-40); ctx.restore();
    }
    if(it.type==='flower'){
      it.y-=it.speedY; it.opacity-=0.004;
      ctx.save(); ctx.translate(it.x,it.y); ctx.globalAlpha=it.opacity; ctx.shadowBlur=50; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.fillStyle=`hsl(${it.hue},100%,85%)`;
      if(it.size<it.maxSize) it.size+=2.5;
      for(let j=0;j<6;j++){ ctx.rotate(Math.PI/3); ctx.beginPath(); ctx.ellipse(0,it.size/2,it.size/3,it.size/1.5,0,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    }
    if(it.type==='hearts'){
      it.y-=it.speedY; it.opacity-=0.004;
      ctx.save(); ctx.translate(it.x,it.y); ctx.globalAlpha=it.opacity; ctx.shadowBlur=50; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.fillStyle=`hsl(${it.hue},100%,85%)`;
      if(it.size<it.maxSize) it.size+=2.5;
      const s=it.size; ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(-s,-s,-s*1.5,s/3,0,s); ctx.bezierCurveTo(s*1.5,s/3,s,-s,0,0); ctx.fill(); ctx.restore();
    }
    if(it.type==='lightTrail'){
      it.opacity-=0.005;
      ctx.save(); ctx.globalAlpha=it.opacity; ctx.shadowBlur=40; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.fillStyle=`hsl(${it.hue},100%,90%)`;
      ctx.beginPath(); ctx.arc(it.x,it.y,it.size,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=it.opacity*0.4; ctx.beginPath(); ctx.arc(it.x,it.y,it.size*2,0,Math.PI*2); ctx.fill();
      if(it.size<it.maxSize) it.size+=0.5;
      for(let j=i-1;j>=Math.max(0,i-3);j--){
        const o=items[j]; if(o&&o.type==='lightTrail'){ ctx.globalAlpha=it.opacity*0.5; ctx.beginPath(); ctx.moveTo(it.x,it.y); ctx.lineTo(o.x,o.y); ctx.strokeStyle=`hsla(${it.hue},100%,70%,${it.opacity*0.5})`; ctx.lineWidth=1; ctx.stroke(); }
      }
      ctx.restore();
    }
    if(it.type==='neonRain'){
      if(!it.hit){ it.y+=it.speed; if(it.y+it.height>=it.targetY) it.hit=true; }
      else { it.opacity-=0.1; it.height*=0.8; }
      ctx.save(); ctx.translate(it.x,it.y); ctx.globalAlpha=it.opacity; ctx.shadowBlur=50; ctx.shadowColor=`hsl(${it.hue},100%,70%)`;
      const gr=ctx.createLinearGradient(0,0,0,it.height); gr.addColorStop(0,`hsla(${it.hue},100%,85%,0)`); gr.addColorStop(1,`hsla(${it.hue},100%,90%,1)`);
      ctx.fillStyle=gr; ctx.fillRect(-it.width/2,0,it.width,it.height); ctx.shadowBlur=60; ctx.fillStyle='white'; ctx.fillRect(-it.width/2,it.height-4,it.width,4); ctx.restore();
    }
    if(it.type==='aurora'){
      it.y-=it.speedY; it.opacity-=0.005; it.waveOffset+=0.05;
      const drift=Math.sin(it.waveOffset)*30; it.points.unshift({x:it.x+drift,y:it.y});
      if(it.points.length>40) it.points.pop();
      if(it.points.length>1){
        ctx.save(); ctx.globalAlpha=it.opacity; ctx.shadowBlur=60; ctx.shadowColor=`hsl(${it.hue},100%,70%)`;
        ctx.beginPath(); ctx.moveTo(it.points[0].x,it.points[0].y);
        for(let j=1;j<it.points.length;j++) ctx.lineTo(it.points[j].x,it.points[j].y);
        ctx.strokeStyle=`hsla(${it.hue},100%,85%,0.9)`; ctx.lineWidth=it.width; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
        ctx.shadowBlur=80; ctx.strokeStyle='white'; ctx.lineWidth=it.width/4; ctx.stroke(); ctx.restore();
      }
    }
    if(it.type==='firework_part'){
      it.x+=it.vx; it.y+=it.vy; it.vy+=it.gravity; it.opacity-=0.015;
      ctx.save(); ctx.globalAlpha=it.opacity; ctx.shadowBlur=50; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.fillStyle=`hsl(${it.hue},100%,90%)`;
      ctx.beginPath(); ctx.arc(it.x,it.y,it.size,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=it.opacity*0.4; ctx.beginPath(); ctx.arc(it.x,it.y,it.size*2.5,0,Math.PI*2); ctx.fill(); ctx.restore();
    }
    if(it.type==='supernova'){
      ctx.save(); ctx.beginPath();
      const grd=ctx.createRadialGradient(it.x,it.y,0,it.x,it.y,it.r);
      grd.addColorStop(0,`hsla(${it.hue},100%,70%,${it.opacity})`); grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd; ctx.arc(it.x,it.y,it.r,0,Math.PI*2); ctx.fill(); ctx.restore();
      it.r+=10; it.opacity-=0.02;
    }
    // TIME-BASED ITEMS
    if(it.type==='wave'){
      const age=(Date.now()-it.timestamp)/1000;
      if(age<3){
        const amp=(it.velocity/127)*150+50, freq=0.01+(it.note/108)*0.02;
        for(let wi=0;wi<3;wi++){
          ctx.strokeStyle=`hsl(${it.hue},100%,85%)`; ctx.lineWidth=6-wi*1.5; ctx.shadowBlur=50; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.globalAlpha=(1-age/3)*(1-wi*0.2);
          ctx.beginPath();
          const tm=Date.now()*0.001;
          for(let x=0;x<W;x+=5){ const y=contentH/2+Math.sin(x*freq+tm*2.5+wi*0.5+it.note*0.1)*amp; if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
          ctx.stroke();
        }
        ctx.globalAlpha=1;
      } else it.opacity=0;
    }
    if(it.type==='spiral'){
      const age=(Date.now()-it.timestamp)/1000;
      if(age<4){
        const maxR=Math.max(W,contentH)*(it.velocity/127), cnt=Math.floor(1+it.note/22), tm=Date.now()*0.001;
        for(let si=0;si<cnt;si++){
          ctx.strokeStyle=`hsl(${it.hue},100%,85%)`; ctx.lineWidth=4; ctx.shadowBlur=40; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.globalAlpha=(1-age/4)*0.8;
          ctx.beginPath();
          for(let r=0;r<maxR;r+=5){ const ang=(r*0.02)+(tm*1.5)+(si*Math.PI*2/cnt)+(it.note*0.05); const x=W/2+Math.cos(ang)*r, y=contentH/2+Math.sin(ang)*r; if(r===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
          ctx.stroke();
        }
        ctx.globalAlpha=1;
      } else it.opacity=0;
    }
    if(it.type==='explosion'){
      const age=(Date.now()-it.timestamp)/1000;
      if(age<2){
        const rays=30+Math.floor(it.note/3), maxLen=Math.max(W,contentH)/2*(it.velocity/127), tm=Date.now()*0.001;
        ctx.shadowBlur=60; ctx.shadowColor=`hsl(${it.hue},100%,70%)`;
        for(let ei=0;ei<rays;ei++){
          const ang=(ei/rays)*Math.PI*2+tm+it.note*0.01, len=maxLen*(1-age/2)*(Math.sin(tm*5+ei*0.1)*0.3+0.7);
          ctx.strokeStyle=`hsl(${it.hue},100%,85%)`; ctx.lineWidth=5; ctx.globalAlpha=1-age/2;
          ctx.beginPath(); ctx.moveTo(W/2,contentH/2); ctx.lineTo(W/2+Math.cos(ang)*len,contentH/2+Math.sin(ang)*len); ctx.stroke();
        }
        ctx.globalAlpha=1;
      } else it.opacity=0;
    }
    if(it.type==='tunnel'){
      const age=(Date.now()-it.timestamp)/1000;
      if(age<5){
        const rings=20, tm=Date.now()*0.001;
        for(let ri=0;ri<rings;ri++){
          const radius=(ri*50)+((tm*25+it.note*10)%100), sides=6;
          ctx.strokeStyle=`hsl(${it.hue},100%,85%)`; ctx.lineWidth=3; ctx.shadowBlur=30; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.globalAlpha=(1-age/5)*(1-ri/rings);
          ctx.beginPath();
          for(let j=0;j<=sides;j++){ const ang=(j/sides)*Math.PI*2+tm, x=W/2+Math.cos(ang)*radius, y=contentH/2+Math.sin(ang)*radius; if(j===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
          ctx.closePath(); ctx.stroke();
        }
        ctx.globalAlpha=1;
      } else it.opacity=0;
    }
    if(it.type==='plasma'){
      const age=(Date.now()-it.timestamp)/1000;
      if(age<3){
        const gs=25, tm=Date.now()*0.001;
        for(let px=0;px<W;px+=gs){ for(let py=0;py<contentH;py+=gs){
          const dx=px-W/2, dy=py-contentH/2, dist=Math.sqrt(dx*dx+dy*dy);
          const val=Math.sin(dist*0.02+tm*5+it.note*0.05)+Math.sin(px*0.01+tm*4)+Math.sin(py*0.01+tm*3);
          const intensity=((val+3)/6)*(it.velocity/127)*(1-age/3);
          ctx.fillStyle=`hsl(${it.hue},100%,85%)`; ctx.globalAlpha=intensity; ctx.shadowBlur=25; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.fillRect(px,py,gs,gs);
        }}
        ctx.globalAlpha=1;
      } else it.opacity=0;
    }
    if(it.type==='lightning'){
      const age=(Date.now()-it.timestamp)/1000;
      if(age<0.5){
        for(let bolt=0;bolt<3;bolt++){
          let lx=it.x+(bolt-1)*100, ly=it.y;
          ctx.strokeStyle=`hsl(${it.hue},100%,90%)`; ctx.lineWidth=5; ctx.shadowBlur=40; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.globalAlpha=1-age*2;
          ctx.beginPath(); ctx.moveTo(lx,ly);
          for(let li=0;li<30;li++){ lx+=(Math.random()-0.5)*100; ly+=(it.targetY-it.y)/30; ctx.lineTo(lx,ly); }
          ctx.stroke();
        }
        ctx.globalAlpha=1;
      } else it.opacity=0;
    }
    if(it.type==='ripple'){
      const age=(Date.now()-it.timestamp)/1000;
      if(age<4){
        it.maxRadius=age*300*(it.velocity/127);
        for(let ri=0;ri<5;ri++){
          const radius=it.maxRadius-ri*50; if(radius<0) continue;
          ctx.strokeStyle=`hsl(${it.hue},100%,85%)`; ctx.lineWidth=4; ctx.shadowBlur=40; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.globalAlpha=(1-age/4)*(1-ri*0.15);
          ctx.beginPath(); ctx.arc(it.x,it.y,radius,0,Math.PI*2); ctx.stroke();
        }
        ctx.globalAlpha=1;
      } else it.opacity=0;
    }
    if(it.type==='spectrum'){
      const age=(Date.now()-it.timestamp)/1000;
      if(age<2){
        const bw=W/88, bIdx=it.note-21, bx=bIdx*bw, barH=(it.velocity/127)*contentH*(1-age/2);
        ctx.fillStyle=`hsl(${it.hue},100%,85%)`; ctx.shadowBlur=30; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.globalAlpha=1-age/2;
        ctx.fillRect(bx,contentH-barH,bw-2,barH); ctx.globalAlpha=1;
      } else it.opacity=0;
    }
    if(it.type==='fire'){
      const age=(Date.now()-it.timestamp)/1000;
      if(age<3){
        const pCnt=Math.floor(it.velocity/10);
        for(let pi=0;pi<pCnt;pi++){
          const ox=(Math.random()-0.5)*50, oy=age*-200+Math.random()*100, sz=(1-age/3)*20*(it.velocity/127);
          ctx.fillStyle=`hsl(${it.hue},100%,85%)`; ctx.shadowBlur=40; ctx.shadowColor=`hsl(${it.hue},100%,70%)`; ctx.globalAlpha=(1-age/3)*(Math.random()*0.5+0.5);
          ctx.fillRect(it.x+ox,it.y+oy,sz,sz);
        }
        ctx.globalAlpha=1;
      } else it.opacity=0;
    }
    if((it.opacity!==undefined&&it.opacity<=0)||it.x<-100) items.splice(i,1);
  }

  // ── TOP HAZE (beams) ──
  if(mode==='beams'){
    const haze=ctx.createLinearGradient(0,0,0,contentH*0.25);
    haze.addColorStop(0,'rgba(0,0,0,0.3)'); haze.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=haze; ctx.fillRect(0,0,W,contentH*0.25);
  }
}
requestAnimationFrame(mainRender);
</script>
</body>
</html>
