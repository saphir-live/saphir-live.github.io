<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPHIR LIVE | Pianiste Classique</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #020c1b; 
            --saphir-blue: #0072ff; /* Bleu Saphir éclatant */
            --saphir-light: #00c6ff;
            --text-light: #ffffff;
            --text-muted: #a8b2d1;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 150px; /* Espace pour le clavier fixe */
        }

        h1, h2, h3, .nav-logo { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 2px; }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0; width: 100%; padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 12, 27, 0.9);
            z-index: 1000;
            border-bottom: 2px solid var(--saphir-blue);
        }
        .nav-logo { font-size: 1.5rem; color: var(--saphir-blue); text-decoration: none; font-weight: bold; }
        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-left: 30px; }
        .nav-links a { text-decoration: none; color: var(--text-light); font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--saphir-blue); text-shadow: 0 0 10px var(--saphir-blue); }

        /* --- Hero --- */
        #home {
            height: 100vh;
            background: linear-gradient(rgba(2, 12, 27, 0.6), rgba(2, 12, 27, 0.9)), 
                        url('https://images.unsplash.com/photo-1552422535-c45813c61732?auto=format&fit=crop&w=1950&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .hero-title { font-size: 5rem; color: var(--text-light); filter: drop-shadow(0 0 15px var(--saphir-blue)); }
        .hero-subtitle { font-size: 1.2rem; color: var(--saphir-light); letter-spacing: 8px; margin-bottom: 30px; }

        .btn {
            padding: 12px 35px;
            border: 2px solid var(--saphir-blue);
            color: var(--text-light);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.4s;
            background: transparent;
            box-shadow: 0 0 10px rgba(0, 114, 255, 0.3);
        }
        .btn:hover { background: var(--saphir-blue); box-shadow: 0 0 20px var(--saphir-blue); }

        /* --- Sections --- */
        section { padding: 100px 10%; }
        .section-title { font-size: 2.5rem; text-align: center; margin-bottom: 60px; }
        .section-title span { color: var(--saphir-blue); }

        /* --- Gallery & Video --- */
        .grid-media { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .media-card { position: relative; overflow: hidden; border: 1px solid var(--saphir-blue); height: 250px; }
        .media-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .media-card:hover img { transform: scale(1.1); filter: brightness(70%) blue(10px); }

        .video-box { grid-column: span 2; position: relative; padding-bottom: 56.25%; height: 0; border: 2px solid var(--saphir-blue); }
        .video-box iframe { position: absolute; top:0; left:0; width:100%; height:100%; }

        /* --- CLAVIER INTERACTIF (Fixé en bas) --- */
        .piano-container {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 120px;
            background: #000;
            display: flex;
            justify-content: center;
            z-index: 2000;
            padding-top: 5px;
            border-top: 3px solid var(--saphir-blue);
        }
        .piano-key {
            position: relative;
            width: 4.5%;
            height: 100%;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            transition: 0.1s;
        }
        .piano-key:active { background: var(--saphir-light); transform: translateY(2px); }
        .piano-key.black {
            width: 2.8%;
            height: 60%;
            background: #111;
            margin-left: -1.4%;
            margin-right: -1.4%;
            z-index: 2;
            border: none;
        }
        .piano-key.black:active { background: var(--saphir-blue); }

        /* --- Footer & Contact --- */
        #contact { text-align: center; background: #010812; }
        .social-links a { color: var(--saphir-blue); font-size: 2rem; margin: 0 15px; transition: 0.3s; }
        .social-links a:hover { color: var(--text-light); transform: scale(1.2); }

        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .nav-links { display: none; }
            .video-box { grid-column: span 1; }
            .piano-key { width: 8%; } /* Plus large sur mobile */
            .piano-key.black { width: 5%; margin-left: -2.5%; margin-right: -2.5%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="nav-logo">SAPHIR LIVE</a>
        <ul class="nav-links">
            <li><a href="#home">Accueil</a></li>
            <li><a href="#media">Galerie</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home">

        <a href="#media" class="btn">Explorer l'univers</a>

    <section id="media">

            <div class="media-card"><img src="https://images.unsplash.com/photo-1520527053876-aa266691c5d4?auto=format&fit=crop&w=600&q=80" alt="Saphir 1"></div>
            <div class="media-card"><img src="https://images.unsplash.com/photo-1465821185615-934289210b39?auto=format&fit=crop&w=600&q=80" alt="Saphir 2"></div>
        </div>

    <section id="contact">

        <div class="social-links">

            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="mailto:contact@saphir-live.fr"><i class="fas fa-envelope"></i></a>

    </section>

        <div class="piano-key" onclick="playNote()"></div>
        <div class="piano-key" onclick="playNote()"></div>
        <div class="piano-key black" onclick="playNote()"></div>
        <div class="piano-key" onclick="playNote()"></div>
        <div class="piano-key black" onclick="playNote()"></div>
        <div class="piano-key" onclick="playNote()"></div>
        <div class="piano-key black" onclick="playNote()"></div>
        <div class="piano-key" onclick="playNote()"></div>
        <div class="piano-key" onclick="playNote()"></div>
        <div class="piano-key black" onclick="playNote()"></div>
        <div class="piano-key" onclick="playNote()"></div>
        <div class="piano-key black" onclick="playNote()"></div>
        <div class="piano-key" onclick="playNote()"></div>
        <div class="piano-key" onclick="playNote()"></div>
        <div class="piano-key black" onclick="playNote()"></div>
        <div class="piano-key" onclick="playNote()"></div>
        <div class="piano-key black" onclick="playNote()"></div>
        <div class="piano-key" onclick="playNote()"></div>
    </div>

    <script>
        function playNote() {
            // Ici, vous pourriez ajouter un fichier son .mp3 pour chaque touche
            console.log("Note jouée !");
        }

        // Animation de la nav au scroll
        window.addEventListener('scroll', function() {
            const nav = document.querySelector('nav');
            if (window.scrollY > 100) {
                nav.style.background = '#020c1b';
                nav.style.boxShadow = '0 5px 20px rgba(0, 114, 255, 0.4)';
            } else {
                nav.style.background = 'rgba(2, 12, 27, 0.9)';
                nav.style.boxShadow = 'none';
            }
        });
    </script>
</body>
</html>
