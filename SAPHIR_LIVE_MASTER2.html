<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPHIR LIVE! — MASTER</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, push as fbPushItem } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚙️ CONFIGURATION FIREBASE
  const firebaseConfig = {
        apiKey:            "AIzaSyDXOd8Sb_TsiYqwbebCnXTdZGimeheesR4",
        authDomain:        "saphir-live.firebaseapp.com",
        projectId:         "saphir-live",
        storageBucket:     "saphir-live.firebasestorage.app",
        messagingSenderId: "719917557935",
        appId:             "1:719917557935:web:3a7a4e1a846732c1afcc5a",
        measurementId:     "G-VQQ9H234NB",
        databaseURL:       "https://saphir-live-default-rtdb.firebaseio.com"
    };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  
  // Références globales
  window._db = db;
  window._lightsRef = ref(db, 'lights');
  window._pianoRef  = ref(db, 'piano');

  // État initial local
  window.fbState = {
    active: true,
    preset: 'AURORA',
    beamCount: 8,
    speed: 1.0,
    intensity: 0.8,
    color1: '#00d4ff',
    color2: '#ff00ff',
    color3: '#ffffff',
    animMode: 'STARDUST',
    showKeyboard: true,
    currentVote: { active: false }
  };

  // Synchronisation sortante (Lights)
  window.push = () => {
    set(window._lightsRef, { ...window.fbState, timestamp: Date.now() });
  };

  // Synchronisation sortante (Piano)
  window.pianoPush = () => {
    if(window.pianoState) set(window._pianoRef, window.pianoState);
  };

  // --- LOGIQUE DE VOTE ---
  let currentPollId = 1;
  let voteListener = null;

  window.masterStartVote = function() {
    const q = document.getElementById('vote-q').value || "Prochaine ambiance ?";
    const opts = [
        document.getElementById('opt1').value,
        document.getElementById('opt2').value,
        document.getElementById('opt3').value,
        document.getElementById('opt4').value
    ].filter(o => o.trim() !== "");

    window.fbState.currentVote = {
      active: true,
      question: q,
      options: opts,
      sessionId: currentPollId,
      timestamp: Date.now()
    };
    window.push();

    // Monitoring
    const monitor = document.getElementById('vote-monitor');
    const list = document.getElementById('results-list');
    monitor.style.display = 'block';
    list.innerHTML = '';

    opts.forEach((opt, i) => {
        list.innerHTML += `
            <div class="vote-result-row">
                <span class="opt-label">${opt}</span>
                <div class="bar-container"><div id="bar-m${i}" class="bar"></div></div>
                <span id="txt-m${i}" class="pct-label">0%</span>
            </div>`;
    });

    if (voteListener) voteListener();
    const resultsRef = ref(db, `votes/session_${currentPollId}`);
    voteListener = onValue(resultsRef, (snap) => {
        const data = snap.val() || {};
        const counts = opts.map((_, i) => data[`m${i+1}`] || 0);
        const total = counts.reduce((a, b) => a + b, 0);

        counts.forEach((count, i) => {
            const pct = total > 0 ? Math.round((count / total) * 100) : 0;
            document.getElementById(`bar-m${i}`).style.width = pct + '%';
            document.getElementById(`txt-m${i}`).innerText = pct + '%';
        });
    });
  };

  window.masterStopVote = function() {
    window.fbState.currentVote = { active: false };
    window.push();
    document.getElementById('vote-monitor').style.display = 'none';
    currentPollId++;
    document.getElementById('display-session-id').innerText = currentPollId;
  };

</script>

<style>
  :root { --neon: #00e5ff; --bg: #0a0a0a; --panel: #151515; }
  body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
  
  /* Colonne Gauche : Contrôles */
  .controls { width: 350px; background: var(--panel); border-right: 1px solid #333; padding: 20px; overflow-y: auto; z-index: 10; }
  .control-group { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 15px; margin-bottom: 20px; border: 1px solid #222; }
  .group-title { font-size: 0.7rem; color: var(--neon); letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; }
  
  /* Éléments UI */
  input[type="text"] { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; box-sizing: border-box; }
  .preset-btn { background: #222; border: 1px solid #444; color: #aaa; padding: 8px; border-radius: 4px; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
  .preset-btn:hover { border-color: var(--neon); color: white; }
  
  /* Vote Monitor */
  .vote-result-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.75rem; }
  .opt-label { width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-container { flex: 1; background: #000; height: 6px; border-radius: 3px; overflow: hidden; }
  .bar { height: 100%; background: var(--neon); width: 0%; transition: width 0.5s ease; box-shadow: 0 0 10px var(--neon); }
  .pct-label { width: 35px; text-align: right; font-weight: bold; }

  /* Droite : Visualisation Piano */
  .preview { flex: 1; position: relative; display: flex; flex-direction: column; background: #000; }
  #piano-container { height: 150px; border-top: 2px solid #333; background: #111; position: relative; }
</style>
</head>
<body>

<div class="controls">
  <h2 style="margin: 0 0 20px 0; font-family: 'Cinzel', serif; color: var(--neon);">SAPHIR MASTER</h2>

  <div class="control-group">
    <div class="group-title">SYSTÈME DE VOTE</div>
    <div style="font-size: 0.7rem; margin-bottom: 10px;">SESSION ACTIVE : <span id="display-session-id" style="color:var(--neon)">1</span></div>
    
    <input type="text" id="vote-q" placeholder="Question du vote..." style="margin-bottom: 10px;">
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px;">
      <input type="text" id="opt1" placeholder="Option 1">
      <input type="text" id="opt2" placeholder="Option 2">
      <input type="text" id="opt3" placeholder="Option 3">
      <input type="text" id="opt4" placeholder="Option 4">
    </div>

    <div style="display: flex; gap: 5px;">
      <button class="preset-btn" onclick="masterStartVote()" style="flex:2; border-color: var(--neon);">DIFFUSER</button>
      <button class="preset-btn" onclick="masterStopVote()" style="flex:1;">STOP</button>
    </div>

    <div id="vote-monitor" style="display:none; margin-top:15px; border-top: 1px solid #333; padding-top: 15px;">
      <div id="results-list"></div>
    </div>
  </div>

  <div class="control-group">
    <div class="group-title">ANIMATION PIANO</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
      <button class="preset-btn" onclick="setAnimMode('STARDUST', this)">STARDUST</button>
      <button class="preset-btn" onclick="setAnimMode('SPECTRUM', this)">SPECTRUM</button>
    </div>
  </div>
</div>

<div class="preview">
  <div style="flex:1; display:flex; align-items:center; justify-content:center; color:#333;">
    <p>[ ZONE DE VISUALISATION MASTER ]</p>
  </div>
  
  <div id="piano-container">
    <div style="padding: 20px; color: #555; font-size: 0.8rem;">CLAVIER VIRTUEL ACTIF</div>
  </div>
</div>

<script>
  // Fonctions de contrôle UI
  function setAnimMode(mode, btn) {
    window.fbState.animMode = mode;
    document.querySelectorAll('.preset-btn').forEach(b => b.style.borderColor = "#444");
    btn.style.borderColor = "var(--neon)";
    window.push();
  }
</script>

</body>
</html>
