<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIANO SLAVE — LIGHT SHOW</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚙️ MÊME CONFIG QUE MASTER
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const pianoRef = ref(db, 'piano');

  onValue(pianoRef, (snap) => {
    const d = snap.val();
    if (!d) return;
    window.pianoState = d;
    window.lastReceived = Date.now();

    // Trigger event effects
    if (d.event === 'noteOn' && d.note && d.velocity) {
      window.triggerNote(d.note, d.velocity, d.noteColor);
    }

    // Update HUD
    updateHUD(d);
  });

  function updateHUD(d) {
    const dot = document.getElementById('syncDot');
    if (dot) { dot.style.background = '#00ff88'; setTimeout(()=>dot.style.background='#00e5ff',250); }
    const animEl = document.getElementById('hudAnim');
    if (animEl) animEl.textContent = (d.animation||'').toUpperCase();
    const chordEl = document.getElementById('hudChord');
    if (chordEl) chordEl.textContent = d.chord || (d.noteName || '—');
  }
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=IBM+Plex+Mono:wght@300;400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  cursor: none;
}

#stage {
  position: fixed;
  inset: 0; width: 100%; height: 100%;
  display: block;
}

/* HUD */
#hud {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 3px;
  color: rgba(255,255,255,0.18);
  background: linear-gradient(transparent, rgba(0,0,0,0.6));
  pointer-events: none;
  z-index: 10;
}

.hud-l { display: flex; align-items: center; gap: 18px; }

.hud-logo {
  font-family: 'Syncopate', sans-serif;
  font-size: 13px; letter-spacing: 5px;
  color: rgba(0,229,255,0.35);
}

.sync-pill {
  display: flex; align-items: center; gap: 7px;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 3px 10px; border-radius: 20px;
}
#syncDot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #00e5ff;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.hud-r { display: flex; gap: 24px; }
.hud-stat { display: flex; flex-direction: column; align-items: flex-end; }
.hud-slabel { font-size: 8px; color: rgba(255,255,255,0.12); margin-bottom: 2px; }
.hud-sval {
  font-family: 'Syncopate', sans-serif;
  font-size: 12px; color: rgba(255,255,255,0.3);
}
#hudChord { color: rgba(255,77,109,0.5); letter-spacing: 3px; }
</style>
</head>
<body>

<canvas id="stage"></canvas>

<div id="hud">
  <div class="hud-l">
    <div class="hud-logo">PIANOLIGHT</div>
    <div class="sync-pill"><div id="syncDot"></div>SLAVE</div>
  </div>
  <div class="hud-r">
    <div class="hud-stat">
      <div class="hud-slabel">ANIMATION</div>
      <div class="hud-sval" id="hudAnim">—</div>
    </div>
    <div class="hud-stat">
      <div class="hud-slabel">NOTE / ACCORD</div>
      <div class="hud-sval" id="hudChord">—</div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize(); window.addEventListener('resize', resize);

// ============================================================
// GLOBAL STATE
// ============================================================
window.pianoState = { animation:'beams', notes:[], pedal:false, energy:0, timestamp:0 };
window.lastReceived = 0;
let t = 0;
let lastFB = {};

// ============================================================
// ANIMATION ENGINES
// ============================================================

// ---------- 1. BEAMS ----------
const beamPool = [];
class Beam {
  constructor(note, velocity, color) {
    this.note = note;
    this.velocity = velocity;
    this.color = color;
    this.x = (note - 21) / 87 * W;
    this.y = H + 20;
    this.angle = -90 + ((note % 12) - 6) / 6 * 55;
    this.life = 1;
    this.decay = 0.005 + Math.random() * 0.008;
    this.width = 2 + velocity / 127 * 6;
    this.glow = 30 + velocity / 127 * 60;
    this.len = Math.sqrt(W*W + H*H);
    this.swing = (Math.random() - 0.5) * 0.3;
    this.active = true;
  }
  draw(ctx, t) {
    if (!this.active) return;
    this.life -= this.decay;
    if (this.life <= 0) { this.active = false; return; }
    this.angle += this.swing * Math.sin(t * 2);
    const rad = this.angle * Math.PI / 180;
    const ex = this.x + Math.cos(rad) * this.len;
    const ey = this.y + Math.sin(rad) * this.len;

    const hx = hexAlpha(this.color, this.life * 0.07);
    const hm = hexAlpha(this.color, this.life * 0.5);
    const hc = hexAlpha(this.color, this.life * 0.95);

    // Outer halo
    const g2 = ctx.createLinearGradient(this.x, this.y, ex, ey);
    g2.addColorStop(0, hx); g2.addColorStop(0.5, hexAlpha(this.color, this.life*0.03)); g2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.save(); ctx.strokeStyle = g2; ctx.lineWidth = 80 * this.life; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(ex,ey); ctx.stroke(); ctx.restore();

    // Mid
    const g1 = ctx.createLinearGradient(this.x, this.y, ex, ey);
    g1.addColorStop(0, hm); g1.addColorStop(0.7, hexAlpha(this.color, this.life*0.1)); g1.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.save(); ctx.shadowBlur = this.glow * this.life; ctx.shadowColor = this.color;
    ctx.strokeStyle = g1; ctx.lineWidth = 12 * this.life; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(ex,ey); ctx.stroke(); ctx.restore();

    // Core
    const g0 = ctx.createLinearGradient(this.x, this.y, ex, ey);
    g0.addColorStop(0, hc); g0.addColorStop(0.8, hexAlpha(this.color, this.life*0.3)); g0.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.save(); ctx.shadowBlur = 50 * this.life; ctx.shadowColor = this.color;
    ctx.strokeStyle = g0; ctx.lineWidth = this.width * this.life; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(ex,ey); ctx.stroke(); ctx.restore();

    // Source burst
    const sr = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 80*this.life);
    sr.addColorStop(0, hexAlpha(this.color, this.life*0.7)); sr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.save(); ctx.fillStyle=sr;
    ctx.beginPath(); ctx.arc(this.x, this.y, 100*this.life, 0, Math.PI*2); ctx.fill(); ctx.restore();
  }
}

function renderBeams(state, t) {
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fillRect(0,0,W,H);
  beamPool.forEach(b => b.draw(ctx, t));
  // Pedal glow
  if (state.pedal) {
    const pg = ctx.createLinearGradient(0, H, 0, H-120);
    pg.addColorStop(0, 'rgba(255,171,0,0.08)'); pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = pg; ctx.fillRect(0, H-120, W, 120);
  }
}

// ---------- 2. AURORA ----------
let auroraTime = 0;
const auroraLayers = Array.from({length:8}, (_,i) => ({
  phase: i * 0.7,
  freq: 0.01 + i * 0.005,
  amp: 0.08 + i * 0.03,
  hue: i * 40,
  speed: 0.3 + i * 0.1
}));
let auroraColors = ['#00e5ff','#ff4d6d','#aaff00','#ffab00'];

function renderAurora(state, t) {
  auroraTime += 0.008;
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0,0,W,H);

  const activeN = state.notes || [];
  if (activeN.length > 0) {
    auroraColors = activeN.slice(0,4).map(n => n.color || '#00e5ff');
  }

  auroraLayers.forEach((layer, li) => {
    const color = auroraColors[li % auroraColors.length];
    const points = [];
    for (let x = 0; x <= W; x += 8) {
      const wave1 = Math.sin(x * layer.freq + auroraTime * layer.speed + layer.phase) * H * layer.amp;
      const wave2 = Math.sin(x * layer.freq * 1.7 + auroraTime * layer.speed * 0.6 + layer.phase * 1.3) * H * 0.04;
      const energy = (state.energy || 0);
      const y = H * (0.2 + li * 0.07) + wave1 + wave2 + energy * H * 0.1;
      points.push({x, y});
    }

    // Ribbon fill
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, hexAlpha(color, 0));
    grd.addColorStop(0.5, hexAlpha(color, 0.15));
    grd.addColorStop(1, hexAlpha(color, 0));

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, H);
    points.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fillStyle = grd;
    ctx.fill();

    // Bright edge line
    ctx.shadowBlur = 20; ctx.shadowColor = color;
    ctx.strokeStyle = hexAlpha(color, 0.4 + (state.energy||0)*0.4);
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    points.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.stroke();
    ctx.restore();
  });

  // Note vertical bursts
  (state.notes||[]).forEach(n => {
    const x = (n.note-21)/87*W;
    const vg = ctx.createLinearGradient(x, H, x, 0);
    vg.addColorStop(0, hexAlpha(n.color||'#fff', 0.3));
    vg.addColorStop(0.5, hexAlpha(n.color||'#fff', 0.05));
    vg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = vg;
    ctx.fillRect(x-20, 0, 40, H);
  });
}

// ---------- 3. PARTICLES ----------
class Particle {
  constructor(x, y, color, velocity) {
    this.x = x; this.y = y; this.ox = x; this.oy = y;
    this.color = color;
    const speed = (velocity / 127) * (4 + Math.random() * 6);
    const angle = Math.random() * Math.PI * 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - 3;
    this.gravity = 0.08;
    this.life = 1; this.decay = 0.008 + Math.random() * 0.015;
    this.size = 1.5 + Math.random() * 3 + velocity/127*3;
    this.trail = [];
  }
  update() {
    this.trail.push({x:this.x, y:this.y});
    if (this.trail.length > 8) this.trail.shift();
    this.vx *= 0.99; this.vy += this.gravity;
    this.x += this.vx; this.y += this.vy;
    this.life -= this.decay;
    return this.life > 0 && this.x > -50 && this.x < W+50 && this.y < H+50;
  }
  draw(ctx) {
    // Trail
    this.trail.forEach((p, i) => {
      const a = (i / this.trail.length) * this.life * 0.3;
      ctx.save(); ctx.globalAlpha = a;
      ctx.fillStyle = this.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, this.size * (i/this.trail.length), 0, Math.PI*2);
      ctx.fill(); ctx.restore();
    });
    // Head
    ctx.save();
    ctx.shadowBlur = 15 * this.life; ctx.shadowColor = this.color;
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

let particles = [];
let sparks = []; // smaller secondary sparks

class Spark {
  constructor(x,y,color) {
    this.x=x; this.y=y; this.color=color;
    const a = Math.random()*Math.PI*2;
    const s = 1+Math.random()*3;
    this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
    this.life=1; this.decay=0.03+Math.random()*0.04;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.05;this.life-=this.decay;return this.life>0;}
  draw(ctx){ctx.save();ctx.globalAlpha=this.life;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);ctx.fill();ctx.restore();}
}

function renderParticles(state, t) {
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(0,0,W,H);
  particles = particles.filter(p => p.update());
  sparks = sparks.filter(s => s.update());
  particles.forEach(p => p.draw(ctx));
  sparks.forEach(s => s.draw(ctx));

  // Ground shimmer if pedal
  if (state.pedal) {
    const y = H - 2;
    (state.notes||[]).forEach(n => {
      const x = (n.note-21)/87*W;
      const grd = ctx.createRadialGradient(x, y, 0, x, y, 60);
      grd.addColorStop(0, hexAlpha(n.color||'#fff', 0.3)); grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd; ctx.fillRect(x-60,H-40,120,40);
    });
  }
}

// ---------- 4. RIPPLE ----------
const ripples = [];
class Ripple {
  constructor(note, velocity, color) {
    this.x = (note-21)/87*W;
    this.y = 0.3*H + ((note%12)/12-0.5)*H*0.3;
    this.color = color;
    this.r = 0;
    this.maxR = 200 + velocity/127*Math.max(W,H)*0.6;
    this.speed = 1.5 + velocity/127*4;
    this.life = 1;
    this.decay = 0.004 + Math.random()*0.003;
    this.rings = Math.floor(1 + velocity/127*3);
    this.ellipseX = 0.8 + Math.random()*0.4;
    this.ellipseY = 0.6 + Math.random()*0.3;
  }
  draw(ctx) {
    this.r += this.speed;
    this.life -= this.decay;
    if (this.life <= 0) return false;
    for (let ring = 0; ring < this.rings; ring++) {
      const rr = Math.max(0, this.r - ring * 30);
      const a = this.life * (1 - ring*0.25) * (1 - rr/this.maxR);
      ctx.save();
      ctx.strokeStyle = hexAlpha(this.color, a);
      ctx.lineWidth = 2 - ring*0.4;
      ctx.shadowBlur = 20 * this.life;
      ctx.shadowColor = this.color;
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, rr*this.ellipseX, rr*this.ellipseY, 0, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }
    // Inner glow on impact
    if (this.r < 60) {
      const ig = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
      ig.addColorStop(0, hexAlpha(this.color, this.life*0.5));
      ig.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = ig;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
    }
    return this.life > 0 && this.r < this.maxR + 100;
  }
}

// Water surface texture
function renderRipple(state, t) {
  ctx.fillStyle = 'rgba(0,0,5,0.15)';
  ctx.fillRect(0,0,W,H);

  // Background water surface
  for (let x = 0; x < W; x += 40) {
    const waveY = H*0.6 + Math.sin(x*0.02 + t*0.5)*20;
    ctx.save();
    ctx.strokeStyle = 'rgba(0,100,150,0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+10, H);
    ctx.stroke(); ctx.restore();
  }

  for (let i = ripples.length-1; i >= 0; i--) {
    if (!ripples[i].draw(ctx)) ripples.splice(i,1);
  }

  // Horizon glow
  const hg = ctx.createLinearGradient(0, H*0.55, 0, H*0.7);
  hg.addColorStop(0,'rgba(0,229,255,0.03)'); hg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = hg; ctx.fillRect(0, H*0.55, W, H*0.15);
}

// ---------- 5. SPECTRUM ----------
const spectrumData = new Float32Array(88).fill(0);
const spectrumPeak = new Float32Array(88).fill(0);
const spectrumPeakTimer = new Float32Array(88).fill(0);

function renderSpectrum(state, t) {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0,0,W,H);

  const activeN = state.notes || [];
  const noteMap = new Map(activeN.map(n => [n.note, n]));

  // Decay
  for (let i=0;i<88;i++) {
    spectrumData[i] *= 0.92;
    spectrumPeakTimer[i]++;
    if (spectrumPeakTimer[i] > 30) spectrumPeak[i] *= 0.98;
  }
  activeN.forEach(n => {
    const idx = n.note - 21;
    if (idx >= 0 && idx < 88) {
      spectrumData[idx] = Math.max(spectrumData[idx], n.velocity/127);
      spectrumPeak[idx] = Math.max(spectrumPeak[idx], n.velocity/127);
      spectrumPeakTimer[idx] = 0;
    }
  });

  const barW = W / 88;
  const energy = state.energy || 0;

  for (let i=0; i<88; i++) {
    const x = i * barW;
    const v = spectrumData[i];
    const peak = spectrumPeak[i];
    if (v < 0.001 && peak < 0.001) continue;

    const barH = v * H * 0.8;
    const n = noteMap.get(i+21);
    const color = n ? n.color : hslFromNote(i);

    // Reflection below center
    const cy = H * 0.5;
    const topY = cy - barH;
    const botY = cy + barH;

    // Main bar
    const grd = ctx.createLinearGradient(x, cy, x, topY);
    grd.addColorStop(0, hexAlpha(color, 0.9));
    grd.addColorStop(0.5, hexAlpha(color, 0.6));
    grd.addColorStop(1, hexAlpha(color, 0.1));
    ctx.save();
    ctx.shadowBlur = 15 * v; ctx.shadowColor = color;
    ctx.fillStyle = grd;
    ctx.fillRect(x+0.5, topY, barW-1, barH);
    ctx.restore();

    // Reflection
    const rgrd = ctx.createLinearGradient(x, cy, x, botY);
    rgrd.addColorStop(0, hexAlpha(color, 0.3));
    rgrd.addColorStop(1, hexAlpha(color, 0));
    ctx.fillStyle = rgrd;
    ctx.fillRect(x+0.5, cy, barW-1, barH*0.6);

    // Peak dot
    if (peak > 0.01) {
      ctx.save();
      ctx.shadowBlur = 8; ctx.shadowColor = color;
      ctx.fillStyle = color;
      ctx.fillRect(x+0.5, cy - peak*H*0.8 - 3, barW-1, 3);
      ctx.restore();
    }
  }

  // Center line
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(0, H*0.5-1, W, 2);

  // Energy pulse wave
  if (energy > 0.3) {
    for (let x=0; x<W; x+=4) {
      const wave = Math.sin(x*0.05 + t*3) * energy * 15;
      ctx.fillStyle = `rgba(0,229,255,${energy*0.03})`;
      ctx.fillRect(x, H*0.5 + wave - 1, 3, 2);
    }
  }
}

function hslFromNote(i) {
  return `hsl(${(i/88)*280},70%,55%)`;
}

// ---------- 6. GALAXY ----------
const stars = [];
const nebulae = [];
let galaxyRotation = 0;

class Star {
  constructor(note, velocity, color) {
    this.note = note; this.velocity = velocity; this.color = color;
    this.orbit = 40 + (note-21)/87 * Math.min(W,H)*0.42;
    this.angle = Math.random()*Math.PI*2;
    this.speed = (0.003 + velocity/127*0.015) * (Math.random()>0.5?1:-1);
    this.size = 2 + velocity/127*5;
    this.life = 1;
    this.decay = 0.002 + Math.random()*0.003;
    this.twinkle = Math.random()*Math.PI*2;
    this.trail = [];
  }
  update() {
    this.trail.push({x: W/2+Math.cos(this.angle)*this.orbit, y: H/2+Math.sin(this.angle)*this.orbit});
    if (this.trail.length > 20) this.trail.shift();
    this.angle += this.speed;
    this.twinkle += 0.1;
    this.life -= this.decay;
    return this.life > 0;
  }
  draw(ctx) {
    const x = W/2+Math.cos(this.angle)*this.orbit;
    const y = H/2+Math.sin(this.angle)*this.orbit;
    const twink = 0.7 + Math.sin(this.twinkle)*0.3;
    const alpha = this.life * twink;

    // Orbital trail
    if (this.trail.length > 2) {
      ctx.save();
      ctx.beginPath();
      this.trail.forEach((p,i) => {
        ctx.globalAlpha = (i/this.trail.length)*alpha*0.5;
        if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);
      });
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }

    // Star glow
    ctx.save();
    ctx.shadowBlur = 20*this.life; ctx.shadowColor = this.color;
    ctx.globalAlpha = alpha;
    const sg = ctx.createRadialGradient(x,y,0,x,y,this.size*3);
    sg.addColorStop(0,'white'); sg.addColorStop(0.2,this.color); sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(x,y,this.size*3,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Spike cross
    ctx.save(); ctx.globalAlpha = alpha*0.6; ctx.strokeStyle='white'; ctx.lineWidth=0.5;
    ctx.shadowBlur=10; ctx.shadowColor=this.color;
    ctx.beginPath();
    ctx.moveTo(x-this.size*4,y); ctx.lineTo(x+this.size*4,y);
    ctx.moveTo(x,y-this.size*4); ctx.lineTo(x,y+this.size*4);
    ctx.stroke(); ctx.restore();
  }
}

let galaxyStars = [];

function renderGalaxy(state, t) {
  ctx.fillStyle = 'rgba(0,0,5,0.1)';
  ctx.fillRect(0,0,W,H);

  galaxyRotation += 0.001 + (state.energy||0)*0.003;

  // Background static stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i=0; i<3; i++) {
    const bx = (Math.sin(i*157.3)*0.5+0.5)*W;
    const by = (Math.sin(i*253.7)*0.5+0.5)*H;
    ctx.fillRect(bx,by,1,1);
  }

  // Nebula if pedal
  if (state.pedal) {
    const nebColors = (state.notes||[]).slice(0,3).map(n=>n.color||'#00e5ff');
    nebColors.forEach((c,i) => {
      const ang = galaxyRotation*0.3 + i*(Math.PI*2/3);
      const nx = W/2 + Math.cos(ang)*W*0.25;
      const ny = H/2 + Math.sin(ang)*H*0.2;
      const ng = ctx.createRadialGradient(nx,ny,0,nx,ny,W*0.3);
      ng.addColorStop(0,hexAlpha(c,0.06)); ng.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = ng; ctx.fillRect(0,0,W,H);
    });
  }

  // Orbital rings (faint)
  for (let r=80; r<Math.min(W,H)*0.5; r+=60) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(W/2, H/2, r, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Galaxy center glow
  const cg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,100+(state.energy||0)*80);
  cg.addColorStop(0,`rgba(255,255,255,${0.05+(state.energy||0)*0.1})`);
  cg.addColorStop(0.3,'rgba(100,200,255,0.02)');
  cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg; ctx.fillRect(0,0,W,H);

  galaxyStars = galaxyStars.filter(s => s.update());
  galaxyStars.forEach(s => s.draw(ctx));
}

// ============================================================
// NOTE TRIGGER (called on Firebase event)
// ============================================================
window.triggerNote = function(note, velocity, color) {
  const anim = (window.pianoState||{}).animation || 'beams';
  color = color || '#00e5ff';

  if (anim === 'beams') {
    // Limit pool size
    if (beamPool.filter(b=>b.active).length < 24) {
      beamPool.push(new Beam(note, velocity, color));
    }
    if (beamPool.length > 80) beamPool.splice(0, 40);
  }
  else if (anim === 'particles') {
    const x = (note-21)/87*W;
    const y = H * (0.4 + (note%12)/12*0.4);
    const count = Math.floor(15 + velocity/127*40);
    for (let i=0;i<count;i++) particles.push(new Particle(x,y,color,velocity));
    for (let i=0;i<count*2;i++) sparks.push(new Spark(x,y,color));
    if (particles.length > 1200) particles.splice(0, 400);
    if (sparks.length > 2000) sparks.splice(0, 600);
  }
  else if (anim === 'ripple') {
    if (ripples.length < 40) ripples.push(new Ripple(note, velocity, color));
  }
  else if (anim === 'galaxy') {
    if (galaxyStars.length < 60) galaxyStars.push(new Star(note, velocity, color));
  }
};

// ============================================================
// MAIN RENDER LOOP
// ============================================================
let lastT = 0;
function mainLoop(ts) {
  requestAnimationFrame(mainLoop);
  t = ts * 0.001;

  const state = window.pianoState || { animation:'beams', notes:[], pedal:false, energy:0 };
  const anim = state.animation || 'beams';

  if (anim === 'beams')    renderBeams(state, t);
  else if (anim === 'aurora')   renderAurora(state, t);
  else if (anim === 'particles') renderParticles(state, t);
  else if (anim === 'ripple')   renderRipple(state, t);
  else if (anim === 'spectrum') renderSpectrum(state, t);
  else if (anim === 'galaxy')   renderGalaxy(state, t);
}
requestAnimationFrame(mainLoop);

// ============================================================
// UTILS
// ============================================================
function hexAlpha(hex, alpha) {
  if (!hex || !hex.startsWith('#')) {
    // Handle hsl() colors
    if (hex && hex.startsWith('hsl')) {
      return hex.replace('hsl', 'hsla').replace(')', `,${alpha})`);
    }
    return `rgba(0,229,255,${alpha})`;
  }
  let r,g,b;
  if (hex.length === 4) {
    r = parseInt(hex[1]+hex[1],16);
    g = parseInt(hex[2]+hex[2],16);
    b = parseInt(hex[3]+hex[3],16);
  } else {
    r = parseInt(hex.slice(1,3),16);
    g = parseInt(hex.slice(3,5),16);
    b = parseInt(hex.slice(5,7),16);
  }
  return `rgba(${r},${g},${b},${alpha})`;
}

// ============================================================
// IDLE DEMO (no MIDI connected yet — subtle ambient animations)
// ============================================================
let idleTimer = 0;
setInterval(() => {
  const sinceLastFB = Date.now() - (window.lastReceived||0);
  if (sinceLastFB > 5000) {
    // Simulate idle ambient note
    const demoNote = 48 + Math.floor(Math.random()*36);
    const demoVel = 40 + Math.floor(Math.random()*50);
    const demoColor = `hsl(${Math.random()*360},70%,60%)`;
    if (!window.pianoState) window.pianoState = {animation:'beams', notes:[], pedal:false, energy:0};
    window.triggerNote(demoNote, demoVel, demoColor);
  }
}, 1500);
</script>
